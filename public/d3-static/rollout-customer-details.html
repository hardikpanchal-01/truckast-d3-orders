<script>
    // ---------- Searching Functionality ---------- //
    (function($) {
        jQuery.expr[':'].Contains = function(a, i, m) {
            return (a.textContent || a.innerText || "").toUpperCase().indexOf(m[3].toUpperCase()) >= 0;
        };

        function listFilter() {
            $('#users-search').change(function () {
                var filter = $(this).val();
                if (filter) {
                    $('#users-tiles').children(".tile:not(:Contains(" + filter + "))").css('display', 'none');
                    $('#users-tiles').children(".tile:Contains(" + filter + ")").css('display', 'block');
                }
                else {
                    $('#users-tiles .tile').css('display', 'block');
                }
                return false;
            }).keyup(function () { $(this).change(); });
        }

        $(function() {
            listFilter();
        });
    }(jQuery));

    // Get customer ID from URL
    function getCustomerId() {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Format date for display (e.g., "4/28" or "10/23")
    function formatShortDate(dateStr) {
        if (!dateStr) return '';
        try {
            var date = new Date(dateStr);
            return (date.getMonth() + 1) + '/' + date.getDate();
        } catch (e) {
            return '';
        }
    }

    // Create a user tile
    function createUserTile(user) {
        var hasLoggedIn = user.last_login != null;
        var bgColor = hasLoggedIn ? '#458b00' : '#c43926'; // Green if logged in, Red if only invited
        var icon = hasLoggedIn ? 'Completed.png' : 'Scheduled.png';
        var statusText = hasLoggedIn
            ? 'LOGGED IN ON ' + formatShortDate(user.last_login)
            : 'INVITED ON ' + formatShortDate(user.invited_on || user.created_at);
        var fullName = (user.full_name || '').toUpperCase();
        var email = user.email || '';
        var userId = user.id;
        var href = '/rollout-user-details?id=' + encodeURIComponent(userId);

        var tile = '<a href="' + href + '" style="text-decoration: none;">' +
            '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: pointer; display: block;">' +
                '<img src="/d3-static/JobsForFixedNodeID_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;">' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon">' +
                        '<img src="/d3-static/JobsForFixedNodeID_files/' + icon + '" style="max-width: 72px; max-height: 80px;">' +
                    '</div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">' + escapeHtml(statusText) + '</div>' +
                            '<div class="tileTitle">' + escapeHtml(fullName) + '</div>' +
                            '<div class="tileSubTitle">' + escapeHtml(email) + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</a>';

        return tile;
    }

    // Create "No Users" tile
    function createNoUsersTile() {
        return '<div class="tile" style="position: relative; background-color: rgb(255, 255, 255); cursor: default; display: block;">' +
                '<img src="/d3-static/JobsForFixedNodeID_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: none;">' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="/d3-static/JobsForFixedNodeID_files/Cancelled.png" style="max-width: 72px; max-height: 80px;"></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle"></div>' +
                            '<div class="tileTitle">NO USERS</div>' +
                            '<div class="tileSubTitle"></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    // Load customer details
    function loadCustomerDetails() {
        var customerId = getCustomerId();
        if (!customerId) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('Error');
            $('#error-text').html('No customer ID provided');
            return;
        }

        showLoadingIndicator();

        $.ajax({
            url: '/api/rollout/customers/' + encodeURIComponent(customerId),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.error) {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error);
                    return;
                }

                renderCustomerDetails(response);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to load customer details: ' + error);
            }
        });
    }

    // Render customer details
    function renderCustomerDetails(data) {
        var customerName = data.name || data.customer_name || 'CUSTOMER';

        // Update page title
        $('#page-title').html('<strong>' + escapeHtml(customerName) + '</strong>');
        document.title = customerName + ' - Customer Details';

        // Update invite button link
        var customerId = getCustomerId();
        $('#invite-button').attr('href', '/rollout-invite?id=' + encodeURIComponent(customerId));

        // Render user tiles
        var users = data.users || [];
        var tilesHtml = '';

        if (users.length === 0) {
            tilesHtml = createNoUsersTile();
        } else {
            $.each(users, function(index, user) {
                tilesHtml += createUserTile(user);
            });
        }

        $('#users-tiles').html(tilesHtml);
    }

    // Load on page ready
    $(document).ready(function() {
        loadCustomerDetails();
    });
</script>
