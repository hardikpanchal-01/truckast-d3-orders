<script>
    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Get user ID from URL
    function getUserIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('id') || params.get('userId') || params.get('UserID');
    }

    // Store current user data
    var currentUser = null;
    var currentApps = [];

    // Load user info and apps
    function loadUserApps() {
        var userId = getUserIdFromUrl();
        if (!userId) {
            $('#user-name').html('<strong>ERROR</strong>');
            $('#apps-tbody').html('<tr><td colspan="2">No User ID provided</td></tr>');
            return;
        }

        $('#userId').val(userId);
        showLoadingIndicator();

        // First get user details
        $.ajax({
            url: '/api/admin/users/' + userId,
            type: 'GET',
            dataType: 'json',
            success: function(userResponse) {
                if (userResponse.success && userResponse.data) {
                    currentUser = userResponse.data;
                    var name = currentUser.name || 'Unknown User';
                    var email = currentUser.email || '';
                    $('#user-name').html('<strong>' + escapeHtml(name.toUpperCase()) + '</strong>');
                    $('#user-email').html('<strong>' + escapeHtml(email) + '</strong>');
                    document.title = name + ' - App Access';
                }

                // Then load apps
                loadAppsTable(userId);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#user-name').html('<strong>ERROR</strong>');
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to load user details: ' + error);
            }
        });
    }

    // Load apps table
    function loadAppsTable(userId) {
        $.ajax({
            url: '/api/admin/users/' + userId + '/apps',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success && response.apps) {
                    currentApps = response.apps;
                    renderAppsTable(response.apps);
                } else {
                    $('#apps-tbody').html('<tr><td colspan="2">No apps available</td></tr>');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to load apps: ' + error);
                $('#apps-tbody').html('<tr><td colspan="2">Failed to load apps</td></tr>');
            }
        });
    }

    // Render apps table
    function renderAppsTable(apps) {
        var html = '';
        var rowClass = 'even';

        $.each(apps, function(index, app) {
            rowClass = (index % 2 === 0) ? 'even gradeA' : 'odd gradeA';
            var checked = app.has_access ? ' checked' : '';
            html += '<tr class="' + rowClass + '">';
            html += '<td style="">' + escapeHtml(app.name) + '</td>';
            html += '<td style=""><input type="checkbox" name="app_' + app.id + '" value="' + app.id + '"' + checked + '></td>';
            html += '</tr>';
        });

        if (html === '') {
            html = '<tr><td colspan="2">No apps available</td></tr>';
        }

        $('#apps-tbody').html(html);

        // Initialize DataTable if available
        if ($.fn.dataTable) {
            $('#apps-table').dataTable({
                "sDom": "<'row'<'span6'l><'span6'f>r>t<'row'<'span6'><'span6'p>>",
                "sPaginationType": "bootstrap",
                "bPaginate": false,
                "bFilter": false,
                "bSort": false,
                "oLanguage": {
                    "sLengthMenu": "_MENU_ records per page"
                },
                "bDestroy": true
            });
        }
    }

    // Form validation
    function onValidate_apps_form() {
        var message = "";
        return message;
    }

    // Form submission
    function onSubmit_apps_form() {
        // Hide all alert boxes first
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate
        var validationMessage = onValidate_apps_form();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        var userId = $('#userId').val();
        if (!userId) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('Error');
            $('#error-text').html('User ID is missing');
            return;
        }

        // Collect selected apps
        var selectedApps = [];
        $('#apps-tbody input[type="checkbox"]:checked').each(function() {
            selectedApps.push($(this).val());
        });

        showLoadingIndicator();

        // Submit via AJAX
        $.ajax({
            url: '/api/admin/users/' + userId + '/apps',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ apps: selectedApps }),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('App access updated successfully');
                    goToByScroll('success-box');
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to update app access');
                    goToByScroll('error-box');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to update app access';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
                goToByScroll('error-box');
            }
        });
    }

    // Initialize on page load
    $(document).ready(function() {
        loadUserApps();
    });
</script>
