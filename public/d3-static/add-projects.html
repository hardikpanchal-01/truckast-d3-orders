<script>
    // Asset path for images
    var ASSET = "/d3-static/JobsForFixedNodeID_files";

    // Tile colors
    var TILE_COLOR_GREEN = '#458b00';
    var DEFAULT_TILE_ICON = 'Completed.png';

    // Store user ID
    var currentUserId = null;

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Get user ID from URL
    function getUserIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('id') || params.get('userId') || params.get('UserID') || params.get('EditUserID');
    }

    // Create a tile for a company
    function createCompanyTile(company) {
        var bgColor = TILE_COLOR_GREEN;
        var iconSrc = ASSET + '/' + DEFAULT_TILE_ICON;
        var name = escapeHtml(company.name || '');
        var code = escapeHtml(company.code || '');
        var projectCount = company.project_count || 0;
        var projectLabel = projectCount + ' PROJECTS';
        var href = '/d3-static/customer-user-projects.html?userId=' + currentUserId + '&customerId=' + company.id;

        var tile = '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: pointer" onclick="tileInvoke(\'' + href + '\');">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + iconSrc + '" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">#' + code + '</div>' +
                            '<div class="tileTitle">' + name.toUpperCase() + '</div>' +
                            '<div class="tileSubTitle">' + projectLabel + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';

        return tile;
    }

    // Tile click handler
    function tileInvoke(url) {
        showLoadingIndicator();
        window.location.href = url;
    }

    // Create "No Results" tile
    function createNoResultsTile() {
        return '<div class="tile" style="position: relative; background-color: rgb(255, 255, 255); cursor: default; display: block;">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: none;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + ASSET + '/Cancelled.png" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle"></div>' +
                            '<div class="tileTitle">NO RESULTS</div>' +
                            '<div class="tileSubTitle"></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    // Load user info
    function loadUserInfo() {
        currentUserId = getUserIdFromUrl();
        console.log('[ADD PROJECTS] User ID from URL:', currentUserId);

        if (!currentUserId) {
            $('#user-name').html('<strong>ERROR</strong>');
            return;
        }

        $('#userId').val(currentUserId);

        console.log('[ADD PROJECTS] Fetching user info...');
        $.ajax({
            url: '/api/admin/users/' + currentUserId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                console.log('[ADD PROJECTS] User info response:', response);
                if (response.success && response.data) {
                    var firstName = response.data.first_name || '';
                    var lastName = response.data.last_name || '';
                    var name = (firstName + ' ' + lastName).trim() || response.data.name || 'Unknown User';
                    $('#user-name').html('<strong>' + escapeHtml(name.toUpperCase()) + '</strong>');
                    document.title = 'Add Projects - ' + name;
                }
            },
            error: function(xhr, status, error) {
                console.error('[ADD PROJECTS] Error fetching user info:', error);
                $('#user-name').html('<strong>Unknown User</strong>');
            }
        });
    }

    // Search for companies
    function searchCompanies() {
        var searchText = $('#searchtext').val().trim();
        if (!searchText) {
            $('#results-tiles').html('');
            return;
        }

        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');

        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/add-projects/search?q=' + encodeURIComponent(searchText),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                var tilesHtml = '';

                if (response.success && response.companies && response.companies.length > 0) {
                    $.each(response.companies, function(index, company) {
                        tilesHtml += createCompanyTile(company);
                    });
                } else {
                    tilesHtml = createNoResultsTile();
                }

                $('#results-tiles').html(tilesHtml);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to search companies';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
                $('#results-tiles').html(createNoResultsTile());
            }
        });
    }

    // Allow Enter key to trigger search
    $(document).ready(function() {
        loadUserInfo();

        $('#searchtext').keypress(function(e) {
            if (e.which === 13) {
                searchCompanies();
                return false;
            }
        });
    });
</script>
