<script>
    // Asset path for images
    var ASSET = "/d3-static/JobsForFixedNodeID_files";

    // Tile colors matching D3
    var COLORS = {
        blue: '#2f7ed8',
        red: '#c43926',
        yellow: '#f7bb00',
        green: '#458b00'
    };

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Format phone number
    function formatPhone(phone) {
        if (!phone) return '';
        var cleaned = phone.replace(/\D/g, '');
        if (cleaned.length === 10) {
            return '(' + cleaned.slice(0, 3) + ') ' + cleaned.slice(3, 6) + '-' + cleaned.slice(6);
        }
        return phone;
    }

    // Format date as M/D/YYYY
    function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
    }

    // Tile click handler
    function tileInvoke(url) {
        if (url.startsWith('tel:') || url.startsWith('mailto:')) {
            window.location.href = url;
        } else {
            window.location.href = url;
        }
    }

    // Create a tile
    function createTile(color, icon, superTitle, title, subTitle, onclick) {
        var iconSrc = icon.startsWith('http') ? icon : (icon ? ASSET + '/' + icon : '');
        var iconHtml = iconSrc ? '<img src="' + iconSrc + '" />' : '';

        return '<div class="tile" style="position: relative; background-color: ' + color + '; cursor: pointer" onclick="' + onclick + '">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon">' + iconHtml + '</div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">' + escapeHtml(superTitle) + '</div>' +
                            '<div class="tileTitle">' + escapeHtml(title) + '</div>' +
                            '<div class="tileSubTitle">' + escapeHtml(subTitle) + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    // Build all tiles for user
    function buildUserTiles(user) {
        var tiles = '';
        var name = user.name || '';
        var nameUpper = name.toUpperCase();
        var email = user.email || '';
        var phone = user.phone || '';
        var phoneFormatted = formatPhone(phone);
        var userId = user.id;
        var customerId = user.customer_id || '';
        var customerName = user.customer_name || '';
        var invitedDate = formatDate(user.invitation_sent_at);

        // 1. Phone tile (Blue)
        if (phone) {
            tiles += createTile(COLORS.blue, 'phone-white@2x.png', nameUpper, phoneFormatted, '', "tileInvoke('tel:" + phone.replace(/\D/g, '') + "');");
        }

        // 2. Email tile (Blue)
        if (email) {
            tiles += createTile(COLORS.blue, 'email-white@2x.png', nameUpper, email, '', "tileInvoke('mailto:" + email + "?Subject=TRUCKAST Access');");
        }

        // 3. Reset Password tile (Red)
        tiles += createTile(COLORS.red, 'Paused.png', nameUpper, 'RESET PASSWORD', '', "tileInvoke('/d3-static/reset-password.html?id=" + userId + "&email=" + encodeURIComponent(email) + "');");

        // 4. Invite More From Company tile (Blue)
        if (customerName) {
            tiles += createTile(COLORS.blue, 'id-card-white@2x.png', 'INVITE MORE FROM', customerName.toUpperCase(), '', "tileInvoke('/admin/customers/" + customerId + "/invite');");
        }

        // 5. Disable/Remove Access tile (Red)
        tiles += createTile(COLORS.red, 'Cancelled.png', 'DISABLE', nameUpper, 'REMOVE ACCESS', "tileInvoke('/admin/users/" + userId + "/disable');");

        // 6. Edit App Access tile (Yellow)
        tiles += createTile(COLORS.yellow, 'Cancelled.png', 'EDIT', 'APP ACCESS FOR', nameUpper, "tileInvoke('/d3-static/app-access.html?id=" + userId + "');");

        // 7. Edit User Information tile (Red)
        tiles += createTile(COLORS.red, 'Cancelled.png', 'EDIT USER', 'INFORMATION', nameUpper, "tileInvoke('/d3-static/edit-user.html?id=" + userId + "');");

        // 8. SMS Download Link tile (Green)
        tiles += createTile(COLORS.green, 'message-notification-white@2x.png', 'SMS', 'DOWNLOAD LINK TO', nameUpper, "tileInvoke('/admin/users/" + userId + "/sms');");

        // 9. User Settings tile (Blue)
        tiles += createTile(COLORS.blue, '', '', 'User Settings', '', "tileInvoke('/d3-static/user-settings.html?id=" + userId + "');");

        // 10. Reinvite User tile (Red)
        tiles += createTile(COLORS.red, 'Paused.png', name, 'REINVITE USER', invitedDate ? 'Invited Date: ' + invitedDate : '', "tileInvoke('/admin/users/" + userId + "/reinvite');");

        // 11. Assigned Companies tile (Blue)
        tiles += createTile(COLORS.blue, 'companyuser.png', 'ASSIGNED', 'COMPANIES', '', "tileInvoke('/d3-static/customer-access.html?id=" + userId + "');");

        // 12. Assigned Projects tile (Blue)
        tiles += createTile(COLORS.blue, 'projects.png', 'ASSIGNED', 'PROJECTS', '', "tileInvoke('/d3-static/user-projects.html?id=" + userId + "');");

        // 13. Add Projects tile (Blue)
        tiles += createTile(COLORS.blue, 'projects.png', 'ADD', 'PROJECTS', '', "tileInvoke('/d3-static/add-projects.html?id=" + userId + "');");

        // 14. Force Logout tile (Blue)
        var forceLogoutStatus = user.forced_logout ? 'Currently Forced To Log Out.' : 'Currently Not Forced To Log Out.';
        tiles += createTile(COLORS.blue, 'user.png', '', name, forceLogoutStatus, "tileInvoke('/admin/users/" + userId + "/force-logout');");

        // 15. Order Tile Access tile (Red/Green based on status)
        var orderTileColor = user.has_order_access ? COLORS.green : COLORS.red;
        var orderTileIcon = user.has_order_access ? 'Completed.png' : 'Cancelled.png';
        var orderTileStatus = user.has_order_access ? 'GRANTED' : 'NOT GRANTED';
        tiles += createTile(orderTileColor, orderTileIcon, 'ACCESS TO', 'ORDER TILE', orderTileStatus, "tileInvoke('/admin/users/" + userId + "/order-access');");

        // 16. Notifications tile (Red)
        tiles += createTile(COLORS.red, 'message-notification-white@2x.png', 'EMAIL & SMS', 'NOTIFICATIONS', email, "tileInvoke('/admin/users/" + userId + "/notifications');");

        return tiles;
    }

    // Get user ID from URL
    function getUserIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('id') || params.get('userId') || params.get('UserID');
    }

    // Load user details
    function loadUserDetails() {
        var userId = getUserIdFromUrl();
        if (!userId) {
            $('#user-title').html('<strong>ERROR</strong>');
            $('#tiles').html('<div class="tile" style="background-color: #fff;"><div class="tileContainer"><div class="tileInfoSection"><div class="tileCell"><div class="tileTitle">No User ID provided</div></div></div></div></div>');
            return;
        }

        $('#userId').val(userId);
        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/users/' + userId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success && response.data) {
                    var user = response.data;
                    var name = user.name || 'Unknown User';
                    $('#user-title').html('<strong>' + escapeHtml(name.toUpperCase()) + '</strong>');
                    document.title = name + ' - User Details';

                    var tilesHtml = buildUserTiles(user);
                    $('#tiles').html(tilesHtml);
                } else {
                    $('#user-title').html('<strong>ERROR</strong>');
                    $('#tiles').html('<div class="tile" style="background-color: #fff;"><div class="tileContainer"><div class="tileInfoSection"><div class="tileCell"><div class="tileTitle">User not found</div></div></div></div></div>');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#user-title').html('<strong>ERROR</strong>');
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to load user details: ' + error);
            }
        });
    }

    // Initialize on page load
    $(document).ready(function() {
        loadUserDetails();
    });
</script>
