<script>
    // Load roles on page load
    function loadRoles() {
        $.ajax({
            url: '/api/admin/roles',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                if (response.success && response.data) {
                    var options = '';
                    response.data.forEach(function(role) {
                        options += '<option value="' + role.id + '">' + escapeHtml(role.name) + '</option>';
                    });
                    $('#roleid').html(options);
                } else {
                    $('#roleid').html('<option value="">NO ROLES FOUND</option>');
                }
            },
            error: function(xhr, status, error) {
                console.error('Failed to load roles:', error);
                $('#roleid').html('<option value="">NO ROLES FOUND</option>');
            }
        });
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Validate form
    function onValidate__invite_form() {
        var message = "";
        var regex;
        var input;

        // Validation for First Name
        regex = /(?!^ +$)^.+$/;
        input = $("#firstname").val();
        if (!regex.test(input)) message = message + 'Please enter a first name.<br/>';

        // Validation for Last Name
        regex = /(?!^ +$)^.+$/;
        input = $("#lastname").val();
        if (!regex.test(input)) message = message + 'Please enter a last name.<br/>';

        // Validation for Email
        regex = /^([a-zA-Z0-9_\-\.]+)@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.)|(([a-zA-Z0-9\-]+\.)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\]?)$/;
        input = $("#email").val();
        if (!regex.test(input)) message = message + 'Email address must be a valid email address.<br/>';

        // Validation for Mobile Number
        regex = /^\+?(\d{1,3})?[-.\s]?(\(?\d{1,4}\)?[-.\s]?)?\d{1,4}[-.\s]?\d{1,4}[-.\s]?\d{1,9}$/;
        input = $("#smartphonenumber").val();
        if (!regex.test(input)) message = message + 'Please enter a mobile number.<br/>';

        return message;
    }

    // Submit form
    function onSubmit_invite_form() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate the form content
        var validationMessage = onValidate__invite_form();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        var data = {
            firstName: $('#firstname').val(),
            lastName: $('#lastname').val(),
            email: $('#email').val(),
            title: $('#labeltitle').val(),
            phone: $('#smartphonenumber').val(),
            measurementSystem: $('#measurementtypeid').val(),
            roleId: $('#roleid').val()
        };

        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/internal/invite',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Internal user invitation sent successfully.');
                    goToByScroll('success-box');

                    // Clear form
                    $('#firstname').val('');
                    $('#lastname').val('');
                    $('#email').val('');
                    $('#labeltitle').val('');
                    $('#smartphonenumber').val('');
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to send invitation.');
                    goToByScroll('error-box');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to send invitation: ' + error);
                goToByScroll('error-box');
            }
        });
    }

    // Initialize
    $(document).ready(function() {
        loadRoles();
    });
</script>
