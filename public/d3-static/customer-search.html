                <!-- Local filter search box -->
                <script>
                    // ---------- Searching Functionality ---------- //
                    (function($) {
                        jQuery.expr[':'].Contains = function(a, i, m) {
                            return (a.textContent || a.innerText || "").toUpperCase().indexOf(m[3].toUpperCase()) >= 0;
                        };

                        function listFilter() {
                            $('#filter-search').change(function () {
                                var filter = $(this).val();
                                if (filter) {
                                    $('#results-tiles').children(".tile:not(:Contains(" + filter + "))").css('display', 'none');
                                    $('#results-tiles').children(".tile:Contains(" + filter + ")").css('display', 'block');
                                }
                                else {
                                    $('#results-tiles .tile').css('display', 'block');
                                }
                                return false;
                            }).keyup(function () { $(this).change(); });
                        }

                        $(function() {
                            listFilter();
                        });
                    }(jQuery));

                    // ---------- Pageshow Event Handler (to restore previous pages search text on Back button) ---------- //
                    window.addEventListener("pageshow", function(evt){
                        var filter = $('#filter-search').val();
                        if (filter) {
                            $('#results-tiles').children(".tile:not(:Contains(" + filter + "))").css('display', 'none');
                            $('#results-tiles').children(".tile:Contains(" + filter + ")").css('display', 'block');
                        }
                        else {
                            $('#results-tiles .tile').css('display', 'block');
                        }
                    }, false);
                </script>

<script>
    // Asset path for images
    var ASSET = "/d3-static/JobsForFixedNodeID_files";

    // Tile colors
    var TILE_COLOR_NO_USERS = '#f7bb00';   // Yellow - no users assigned
    var TILE_COLOR_HAS_USERS = '#458b00';  // Green - has users assigned
    var DEFAULT_TILE_ICON = 'Completed.png';

    function onValidate_search() {
        var message = "";
        return message;
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Create a tile for a customer - matching Company Search design
    function createCustomerTile(customer) {
        var userCount = customer.user_count || 0;
        var bgColor = userCount > 0 ? TILE_COLOR_HAS_USERS : TILE_COLOR_NO_USERS;
        var iconSrc = ASSET + '/' + DEFAULT_TILE_ICON;
        var name = escapeHtml(customer.name || '');
        var code = escapeHtml(customer.code || '');
        var userLabel = userCount + ' USERS';
        var href = '/d3-static/customer-details.html?id=' + customer.id;

        var tile = '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: pointer" onclick="tileInvoke(\'' + href + '\');">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + iconSrc + '" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">#' + code + '</div>' +
                            '<div class="tileTitle">' + name.toUpperCase() + '</div>' +
                            '<div class="tileSubTitle">' + userLabel + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';

        return tile;
    }

    // Tile click handler
    function tileInvoke(url) {
        showLoadingIndicator();
        window.location.href = url;
    }

    // Create "No Results" tile
    function createNoResultsTile() {
        return '<div class="tile" style="position: relative; background-color: rgb(255, 255, 255); cursor: default; display: block;">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: none;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + ASSET + '/Cancelled.png" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle"></div>' +
                            '<div class="tileTitle">NO RESULTS</div>' +
                            '<div class="tileSubTitle"></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    function onSubmit_search() {
        // Hide all alert boxes first
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate
        var validationMessage = onValidate_search();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        var searchText = $('#searchtext').val();
        if (!searchText || searchText.trim().length === 0) {
            $('#results-tiles').html('');
            return;
        }

        // Show loading indicator
        showLoadingIndicator();

        // Search via AJAX
        $.ajax({
            url: '/api/customers?search=' + encodeURIComponent(searchText),
            type: 'GET',
            dataType: 'json',
            xhrFields: {
                withCredentials: true
            },
            success: function(response) {
                hideLoadingIndicator();

                // Check for error in response
                if (response.error) {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error === 'No tenant selected'
                        ? 'Please select a tenant first. Go to Settings and select a tenant.'
                        : response.error);
                    goToByScroll('error-box');
                    $('#results-tiles').html(createNoResultsTile());
                    return;
                }

                var tilesHtml = '';

                if (response.customers && response.customers.length > 0) {
                    $.each(response.customers, function(index, customer) {
                        tilesHtml += createCustomerTile(customer);
                    });
                } else {
                    tilesHtml = createNoResultsTile();
                }

                $('#results-tiles').html(tilesHtml);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to search customers';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) {
                        errorMsg = resp.error === 'No tenant selected'
                            ? 'Please select a tenant first. Go to Settings and select a tenant.'
                            : resp.error;
                    }
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
                goToByScroll('error-box');
                $('#results-tiles').html(createNoResultsTile());
            }
        });
    }

    // Allow Enter key to trigger search
    $(document).ready(function() {
        $('#searchtext').keypress(function(e) {
            if (e.which === 13) {
                onSubmit_search();
                return false;
            }
        });
    });
</script>
