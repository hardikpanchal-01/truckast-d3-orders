<script>
    var ASSET = "/d3-static/JobsForFixedNodeID_files";
    var TILE_COLOR_NO_USERS = '#f7bb00';
    var TILE_COLOR_HAS_USERS = '#458b00';
    var DEFAULT_TILE_ICON = 'Completed.png';

    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function createProjectTile(project) {
        var userCount = project.user_count || 0;
        var bgColor = TILE_COLOR_HAS_USERS;
        var iconSrc = ASSET + '/' + DEFAULT_TILE_ICON;
        var name = escapeHtml(project.name || '');
        var code = escapeHtml(project.code || '');
        var customerName = escapeHtml(project.customer_name || '');
        var userLabel = userCount + ' USERS';
        var href = '/d3-static/invite-to-project.html?id=' + project.id + '&name=' + encodeURIComponent(project.name) + '&code=' + encodeURIComponent(project.code);

        var tile = '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: pointer" onclick="tileInvoke(\'' + href + '\');">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + iconSrc + '" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">' + customerName.toUpperCase() + '</div>' +
                            '<div class="tileTitle">' + name.toUpperCase() + '</div>' +
                            '<div class="tileSubTitle">' + userLabel + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';

        return tile;
    }

    function tileInvoke(url) {
        showLoadingIndicator();
        window.location.href = url;
    }

    function createNoResultsTile() {
        return '<div class="tile" style="position: relative; background-color: rgb(255, 255, 255); cursor: default; display: block;">' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + ASSET + '/Cancelled.png" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileTitle">NO RESULTS</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    function onSubmit_search() {
        $('#error-box').css('display', 'none');

        var searchText = $('#searchtext').val();
        if (!searchText || searchText.trim().length === 0) {
            $('#results-tiles').html('');
            return;
        }

        showLoadingIndicator();

        $.ajax({
            url: '/api/projects?search=' + encodeURIComponent(searchText),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.error) {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error);
                    $('#results-tiles').html(createNoResultsTile());
                    return;
                }

                var tilesHtml = '';
                var projects = response.projects || response.data || [];
                if (projects.length > 0) {
                    $.each(projects, function(index, project) {
                        tilesHtml += createProjectTile(project);
                    });
                } else {
                    tilesHtml = createNoResultsTile();
                }

                $('#results-tiles').html(tilesHtml);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to search: ' + error);
                $('#results-tiles').html(createNoResultsTile());
            }
        });
    }

    // Filter tiles on search input
    $('#filter-search').on('keyup', function() {
        var filter = $(this).val().toLowerCase();
        $('#results-tiles .tile').each(function() {
            var text = $(this).text().toLowerCase();
            $(this).toggle(text.indexOf(filter) > -1);
        });
    });

    // Search on Enter key
    $('#searchtext').on('keypress', function(e) {
        if (e.which === 13) {
            onSubmit_search();
        }
    });
</script>
