<script>
    // Store data
    var currentUserId = null;
    var allProjects = [];
    var projectsToRemove = [];

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Get user ID from URL
    function getUserIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('id') || params.get('userId') || params.get('UserID') || params.get('EditUserID');
    }

    // Load user info
    function loadUserInfo() {
        currentUserId = getUserIdFromUrl();
        if (!currentUserId) {
            $('#user-name').html('<strong>ERROR</strong>');
            $('#projects-tbody').html('<tr><td colspan="4">Missing User ID</td></tr>');
            return;
        }

        $('#userId').val(currentUserId);
        $('#add-projects-link').attr('href', '/d3-static/add-projects.html?id=' + currentUserId);

        showLoadingIndicator();

        // Load user info
        $.ajax({
            url: '/api/admin/users/' + currentUserId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                if (response.success && response.data) {
                    var name = response.data.name || 'Unknown User';
                    $('#user-name').html('<strong>' + escapeHtml(name) + '</strong>');
                    document.title = name + ' - Assigned Projects';
                }
            }
        });

        // Load projects
        loadUserProjects();
    }

    // Load user's projects
    function loadUserProjects() {
        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/projects',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    allProjects = response.projects || [];
                    renderProjectsTable(allProjects);
                } else {
                    $('#projects-tbody').html('<tr><td colspan="4">Failed to load projects</td></tr>');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#projects-tbody').html('<tr><td colspan="4">Failed to load projects: ' + error + '</td></tr>');
            }
        });
    }

    // Render projects table
    function renderProjectsTable(projects) {
        var html = '';

        if (projects.length === 0) {
            html = '<tr><td colspan="4">No projects assigned to this user</td></tr>';
        } else {
            $.each(projects, function(index, project) {
                var rowClass = (index % 2 === 0) ? 'even gradeA' : 'odd gradeA';
                var customerDisplay = project.customer_name ? project.customer_name + ' (' + project.customer_code + ')' : '';

                html += '<tr class="' + rowClass + '">';
                html += '<td>' + escapeHtml(project.name) + '</td>';
                html += '<td>' + escapeHtml(project.code) + '</td>';
                html += '<td>' + escapeHtml(customerDisplay) + '</td>';
                html += '<td><input type="checkbox" name="remove_' + project.id + '" value="' + project.id + '" onchange="toggleRemove(\'' + project.id + '\', this.checked)"></td>';
                html += '</tr>';
            });
        }

        $('#projects-tbody').html(html);
    }

    // Toggle project removal selection
    function toggleRemove(projectId, checked) {
        if (checked) {
            if (projectsToRemove.indexOf(projectId) === -1) {
                projectsToRemove.push(projectId);
            }
        } else {
            var idx = projectsToRemove.indexOf(projectId);
            if (idx > -1) {
                projectsToRemove.splice(idx, 1);
            }
        }
    }

    // Submit form
    function onSubmit_form() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');

        if (projectsToRemove.length === 0) {
            $('#warning-box').css('display', 'block');
            $('#warning-title').html('No Changes');
            $('#warning-text').html('No projects selected to remove');
            return;
        }

        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/projects',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                remove: projectsToRemove
            }),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Projects removed successfully');
                    goToByScroll('success-box');

                    // Reset and reload
                    projectsToRemove = [];
                    loadUserProjects();
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to remove projects');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to remove projects';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
            }
        });
    }

    // Initialize
    $(document).ready(function() {
        loadUserInfo();
    });
</script>
