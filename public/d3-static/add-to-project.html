<div style="display: block; width:100%">
<table class="table table-hover">
    <tbody>

            </td>

                <input id="company" name="company" value="" style="margin-bottom: 0; width: 95%; display: block;" type="text" placeholder="">
            </td>
        </tr>
        <tr>
            <td style="vertical-align: middle; width: 30%">
                <div class="d3-label" style="width: 100%;">Role (*)</div>
            </td>
            <td style="vertical-align: middle; width: 70%">
                <select id="companytypeid" name="companytypeid" style="width: 100%; margin-bottom: 0; display: block;">
                    <option value="owner">OWNER</option>
                    <option value="architect">ARCHITECT</option>
                    <option value="engineer">ENGINEER</option>
                    <option value="project_manager">PROJECT MANAGER</option>
                    <option value="general_contractor">GENERAL CONTRACTOR</option>
                    <option value="testing_lab">TESTING LAB</option>
                    <option value="subcontractor">SUBCONTRACTOR</option>
                    <option value="material_supplier">MATERIAL SUPPLIER</option>
                </select>
            </td>
        </tr>
        <tr>
            <td style="vertical-align: middle; width: 30%">
                <div class="d3-label" style="width: 100%;">Notes</div>
            </td>
            <td style="vertical-align: middle; width: 70%">
                <input id="notes" name="notes" value="" style="margin-bottom: 0; width: 95%; display: block;" type="text" placeholder="">
            </td>

                <div class="d3-label" style="width: 100%;">Active (*)</div>
            </td>

                <select id="isactive" name="isactive" style="width: 100%; margin-bottom: 0; display: block;">
                    <option value="0">INACTIVE</option>

</table>

<button id="submit-button" class="btn btn-danger" type="button" onclick="onSubmit_add_to_project()" style="width: 150px">SUBMIT</button>

</form>

<script>
    var projectId = null;
    var customerId = null;
    var projectCompanyId = null;

    // Get URL parameters
    function getUrlParams() {
        var urlParams = new URLSearchParams(window.location.search);
        return {
            projectId: urlParams.get('projectId') || urlParams.get('ProjectID'),
            customerId: urlParams.get('customerId') || urlParams.get('CustomerID'),
            projectCompanyId: urlParams.get('projectCompanyId') || urlParams.get('companyId')
        };
    }

    // Load project company data
    function loadProjectCompanyData() {
        var params = getUrlParams();
        projectId = params.projectId;
        customerId = params.customerId;
        projectCompanyId = params.projectCompanyId;

        if (!projectId || !projectCompanyId) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('Error');
            $('#error-text').html('Missing required parameters');
            return;
        }

        $('#projectId').val(projectId);
        $('#customerId').val(customerId);
        $('#projectCompanyId').val(projectCompanyId);

        showLoadingIndicator();

        $.ajax({
            url: '/api/projects/' + encodeURIComponent(projectId) + '/companies/' + encodeURIComponent(projectCompanyId),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.error) {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error);
                    return;
                }

                // Update page title
                var projectName = response.project_name || 'PROJECT';
                $('#page-title').html('<strong>EDIT COMPANY FOR ' + projectName.toUpperCase() + '</strong>');
                document.title = 'Edit Company - ' + projectName;

                // Populate form fields
                $('#company').val(response.company_name || '');
                $('#companytypeid').val(response.role || 'general_contractor');
                $('#notes').val(response.notes || '');
                $('#isactive').val(response.is_active ? '1' : '0');

                // Update invite user button - link to new invite page with company name
                var companyNameEncoded = encodeURIComponent(response.company_name || '');
                if (customerId) {
                    $('#invite-user-btn').attr('href', '/d3-static/invite-user-to-company.html?customerId=' + customerId + '&projectId=' + projectId + '&companyName=' + companyNameEncoded);
                } else {
                    $('#invite-user-btn').attr('href', '/d3-static/invite-user-to-company.html?projectId=' + projectId + '&companyName=' + companyNameEncoded);
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to load data: ' + error);
            }
        });
    }

    // Validate form
    function onValidate_add_to_project() {
        var message = "";

        var company = $('#company').val();
        if (!company || company.trim().length === 0) {
            message += "Company is required.<br/>";
        }

        return message;
    }

    // Submit form
    function onSubmit_add_to_project() {
        // Validate
        var validationMessage = onValidate_add_to_project();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        // Hide alerts
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');

        // Collect data
        var data = {
            company_name: $('#company').val(),
            role: $('#companytypeid').val(),
            notes: $('#notes').val(),
            is_active: $('#isactive').val() === '1'
        };

        showLoadingIndicator();

        $.ajax({
            url: '/api/projects/' + encodeURIComponent(projectId) + '/companies/' + encodeURIComponent(projectCompanyId),
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();
                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Company updated successfully!');
                    setTimeout(function() {
                        history.back();
                    }, 1500);
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to update company');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to save: ' + error);
            }
        });
    }

    // Initialize
    $(document).ready(function() {
        loadProjectCompanyData();
    });
</script>

    </div>
