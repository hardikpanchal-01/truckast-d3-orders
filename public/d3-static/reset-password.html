<script>
    // Get parameters from URL
    function getUrlParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Load user info
    function loadUserInfo() {
        var userId = getUrlParam('id') || getUrlParam('userId') || getUrlParam('UserID');
        var email = getUrlParam('email') || getUrlParam('Email');

        if (email) {
            // If email is provided directly in URL
            $('#username').text(email);
            $('#userEmail').val(email);
        }

        if (userId) {
            $('#userId').val(userId);

            // Fetch user details
            $.ajax({
                url: '/api/admin/users/' + userId,
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response.success && response.data) {
                        var user = response.data;
                        var name = user.name || '';
                        var email = user.email || '';

                        // Set title to user's name (uppercase)
                        $('#page-title').html('<strong>' + escapeHtml(name.toUpperCase()) + '</strong>');
                        document.title = name + ' - Update Password';

                        // Set username field to email
                        $('#username').text(email);
                        $('#userEmail').val(email);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('Failed to load user:', error);
                    $('#page-title').html('<strong>ERROR</strong>');
                }
            });
        } else {
            $('#page-title').html('<strong>ERROR</strong>');
            $('#username').text('No user ID provided');
        }
    }

    // Validate form
    function onValidate__selfregister_form() {
        var message = "";
        var regex;
        var input;

        // Validation for Password
        regex = /^.+/;
        input = $("#password").val();
        if (!regex.test(input)) {
            message = message + 'Password cannot be empty or contain spaces.<br/>';
        }

        // Validation for Confirm Password
        regex = /^.+/;
        input = $("#confirmpassword").val();
        if (!regex.test(input)) {
            message = message + 'Confirm Password cannot be empty or contain spaces.<br/>';
        }

        // Check if passwords match
        var lval = $('#password').val();
        var rval = $('#confirmpassword').val();
        if (lval != rval) {
            message = message + "The passwords do not match<br/>";
        }

        return message;
    }

    // Submit password update
    function onSubmit_selfregister_form() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate
        var validationMessage = onValidate__selfregister_form();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        var userId = $('#userId').val();
        var email = $('#userEmail').val();
        var password = $('#password').val();

        // Show loading indicator
        showLoadingIndicator();

        // Send password update request
        $.ajax({
            url: '/api/admin/users/update-password',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                userId: userId,
                email: email,
                password: password
            }),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Password has been updated successfully.');
                    goToByScroll('success-box');

                    // Clear password fields
                    $('#password').val('');
                    $('#confirmpassword').val('');
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to update password.');
                    goToByScroll('error-box');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to update password: ' + error);
                goToByScroll('error-box');
            }
        });
    }

    // Initialize on page load
    $(document).ready(function() {
        loadUserInfo();

        // Allow Enter key to trigger submit
        $('#password, #confirmpassword').keypress(function(e) {
            if (e.which === 13) {
                onSubmit_selfregister_form();
                return false;
            }
        });
    });
</script>
