<script>
    // Store data globally
    var productData = null;
    var productCategories = [];
    var productUnits = [];

    // Get product ID from URL
    function getProductId() {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('productId') || urlParams.get('productid') || urlParams.get('id');
    }

    // Get project ID from URL (for context)
    function getProjectId() {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('projectId') || urlParams.get('projectid');
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Set subtitle (not used - header only shows PRODUCT EDIT)
    function setSubtitle(text) {
        // Subtitle removed to match D3 original
    }

    // Show error message
    function showError(title, message) {
        var errorBox = document.getElementById('error-box');
        var errorTitle = document.getElementById('error-title');
        var errorText = document.getElementById('error-text');
        if (errorBox) errorBox.style.display = 'block';
        if (errorTitle) errorTitle.innerHTML = title;
        if (errorText) errorText.innerHTML = message;
    }

    // Show success message
    function showSuccess(title, message) {
        var successBox = document.getElementById('success-box');
        var successTitle = document.getElementById('success-title');
        var successText = document.getElementById('success-text');
        if (successBox) successBox.style.display = 'block';
        if (successTitle) successTitle.innerHTML = title;
        if (successText) successText.innerHTML = message;
    }

    // Hide all messages
    function hideMessages() {
        var errorBox = document.getElementById('error-box');
        var successBox = document.getElementById('success-box');
        if (errorBox) errorBox.style.display = 'none';
        if (successBox) successBox.style.display = 'none';
    }

    // Load product categories
    function loadProductCategories() {
        // Default product categories (from D3 source)
        productCategories = [
            { id: 'CONCRETE', name: 'CONCRETE' },
            { id: 'AGGREGATE', name: 'AGGREGATE' },
            { id: 'GROUT', name: 'GROUT' },
            { id: 'NON-CONCRETE', name: 'NON-CONCRETE' },
            { id: 'EXTRA CHARGE', name: 'EXTRA CHARGE' },
            { id: 'FIBER', name: 'FIBER' },
            { id: 'FLYASH', name: 'FLYASH' },
            { id: 'WATER', name: 'WATER' },
            { id: 'PLASTICIZER', name: 'PLASTICIZER' },
            { id: 'OTHER ADMIXTURE', name: 'OTHER ADMIXTURE' },
            { id: 'OTHER PRODUCT', name: 'OTHER PRODUCT' },
            { id: 'AIR/NON-AIR', name: 'AIR/NON-AIR' },
            { id: 'PSI', name: 'PSI' },
            { id: 'ROCKSIZE', name: 'ROCKSIZE' },
            { id: 'UNKNOWN', name: 'UNKNOWN' }
        ];
        renderProductCategories();
    }

    // Load product units
    function loadProductUnits() {
        // Default product units (from D3 source)
        productUnits = [
            { id: 'CY', name: 'CY', fullName: 'CUBIC YARDS' },
            { id: 'TN', name: 'TN', fullName: 'TONS' },
            { id: 'EA', name: 'EA', fullName: 'EACH' },
            { id: 'LB', name: 'LB', fullName: 'POUNDS' },
            { id: 'OZ', name: 'OZ', fullName: 'OUNCES' },
            { id: 'GA', name: 'GA', fullName: 'GALLONS' },
            { id: 'CM', name: 'CM', fullName: 'CM' },
            { id: 'AC', name: 'AC', fullName: 'AC' },
            { id: '/Y', name: '/Y', fullName: 'PER CUBIC YARD' },
            { id: 'PER HOUR', name: 'PER HOUR', fullName: 'PER HOUR' }
        ];
        renderProductUnits();
    }

    // Render product categories dropdown
    function renderProductCategories() {
        var select = document.getElementById('producttype');
        if (!select) return;

        select.innerHTML = '';
        for (var i = 0; i < productCategories.length; i++) {
            var cat = productCategories[i];
            var option = document.createElement('option');
            option.value = cat.id;
            option.textContent = cat.name;
            select.appendChild(option);
        }

        // Set selected value if product data is loaded
        if (productData && productData.category) {
            select.value = productData.category;
        }
    }

    // Render product units dropdown
    function renderProductUnits() {
        var select = document.getElementById('productunit');
        if (!select) return;

        select.innerHTML = '';
        for (var i = 0; i < productUnits.length; i++) {
            var unit = productUnits[i];
            var option = document.createElement('option');
            option.value = unit.id;
            option.textContent = unit.fullName || unit.name;
            select.appendChild(option);
        }

        // Set selected value if product data is loaded
        if (productData && productData.uom) {
            select.value = productData.uom;
        }
    }

    // Load product details
    function loadProductDetails() {
        var productId = getProductId();
        var projectId = getProjectId();

        if (!productId) {
            showError('Error', 'No product ID provided');
            return;
        }

        var apiUrl = '/api/projects/products/' + encodeURIComponent(productId);
        if (projectId) {
            apiUrl += '?projectId=' + encodeURIComponent(projectId);
        }

        fetch(apiUrl)
            .then(function(response) { return response.json(); })
            .then(function(data) {
                console.log('[Product Edit] Product Response:', data);

                if (data.error) {
                    showError('Error', data.error);
                    return;
                }

                productData = data.product || data;
                renderProductDetails();
            })
            .catch(function(error) {
                console.error('[Product Edit] Fetch error:', error);
                showError('Error', 'Failed to load product details: ' + error.message);
            });
    }

    // Render product details
    function renderProductDetails() {
        if (!productData) return;

        // Set mix code (display only)
        var mixCodeEl = document.getElementById('mixcode-display');
        if (mixCodeEl) {
            mixCodeEl.textContent = productData.item_code || productData.code || '-';
        }

        // Set subtitle
        setSubtitle(productData.item_code || productData.code || '');

        // Set description
        var descInput = document.getElementById('mixdesc');
        if (descInput) {
            descInput.value = productData.description || productData.short_description || '';
        }

        // Set category
        var categorySelect = document.getElementById('producttype');
        if (categorySelect && productData.category) {
            categorySelect.value = productData.category;
        }

        // Set UOM
        var uomSelect = document.getElementById('productunit');
        if (uomSelect && productData.uom) {
            // Try to match by code
            var uomCode = productData.uom || productData.estimated_quantity_unit_code || '';
            for (var i = 0; i < uomSelect.options.length; i++) {
                if (uomSelect.options[i].value === uomCode ||
                    uomSelect.options[i].textContent.indexOf(uomCode) !== -1) {
                    uomSelect.selectedIndex = i;
                    break;
                }
            }
        }

        // Update page title
        document.title = 'Product Edit - ' + (productData.item_code || productData.code || '');
    }

    // Validate form
    function validateForm() {
        var errors = [];
        // Add validation if needed
        return errors;
    }

    // Submit handler
    function onSubmit_productedit() {
        var productId = getProductId();
        var projectId = getProjectId();

        if (!productId) {
            showError('Error', 'No product ID');
            return;
        }

        // Validate
        var errors = validateForm();
        if (errors.length > 0) {
            showError('Validation Error', errors.join('<br>'));
            return;
        }

        hideMessages();

        // Gather form data
        var formData = {
            product_id: productId,
            project_id: projectId,
            description: document.getElementById('mixdesc').value.trim(),
            category: document.getElementById('producttype').value,
            uom: document.getElementById('productunit').value
        };

        console.log('[Product Edit] Submitting:', formData);

        var apiUrl = '/api/projects/products/' + encodeURIComponent(productId);

        fetch(apiUrl, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            console.log('[Product Edit] Update Response:', data);

            if (data.error) {
                showError('Error', data.error);
                return;
            }

            showSuccess('Success', 'Product updated successfully!');

            // Go back after 1.5 seconds
            setTimeout(function() {
                history.back();
            }, 1500);
        })
        .catch(function(error) {
            console.error('[Product Edit] Update error:', error);
            showError('Error', 'Failed to update product: ' + error.message);
        });
    }

    // Load on page ready
    document.addEventListener('DOMContentLoaded', function() {
        loadProductCategories();
        loadProductUnits();
        loadProductDetails();
    });
</script>
