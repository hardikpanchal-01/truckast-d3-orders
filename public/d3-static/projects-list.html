<script>
    $(document).ready(function () {
        // Initialize DataTable immediately on page load (like D3 does)
        $('#projects-table').dataTable({
            "sDom": "<'row'<'span6'l><'span6'f>r>t<'row'<'span6'><'span6'p>>",
            "sPaginationType": "bootstrap",
            "bPaginate": false,
            "bFilter": true,
            "bSort": true,
            "oLanguage": {
                "sLengthMenu": "_MENU_ records per page"
            }
        });

        // Then load user info and projects
        loadUserInfo();
    });
</script>

                <button id="submit-button" class="btn btn-danger" type="button" onclick="onSubmit_projects_list()" style="width: 150px">SUBMIT</button>

<script>
    // Store data
    var currentUserId = null;
    var currentUserName = '';
    var currentCustomerCode = '';
    var allProjects = [];
    var projectsToRemove = [];

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Get user ID from URL
    function getUserIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('userId') || params.get('id') || params.get('UserID') || params.get('EditUserID');
    }

    // Navigate to add projects page
    function goToAddProjects() {
        if (currentUserId) {
            showLoadingIndicator();
            window.location.href = '/d3-static/add-projects.html?userId=' + encodeURIComponent(currentUserId);
        }
    }

    // Load user info
    function loadUserInfo() {
        currentUserId = getUserIdFromUrl();
        console.log('[PROJECTS LIST] User ID from URL:', currentUserId);

        if (!currentUserId) {
            $('#user-name').html('<strong>ERROR - No User ID</strong>');
            return;
        }

        $('#userId').val(currentUserId);

        showLoadingIndicator();

        console.log('[PROJECTS LIST] Fetching user info...');
        $.ajax({
            url: '/api/admin/users/' + currentUserId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                console.log('[PROJECTS LIST] User info response:', response);
                if (response.success && response.data) {
                    var firstName = response.data.first_name || '';
                    var lastName = response.data.last_name || '';
                    currentUserName = (firstName + ' ' + lastName).trim() || response.data.name || 'Unknown User';
                    currentCustomerCode = response.data.customer_code || '';

                    var displayText = currentUserName.toUpperCase();
                    if (currentCustomerCode) {
                        displayText += ' - ' + currentCustomerCode;
                    }
                    $('#user-name').html('<strong>' + escapeHtml(displayText) + '</strong>');
                    document.title = currentUserName + ' - Assigned Projects';
                }
            },
            error: function(xhr, status, error) {
                console.error('[PROJECTS LIST] Error fetching user info:', error);
                $('#user-name').html('<strong>Unknown User</strong>');
            }
        });

        // Load projects
        loadUserProjects();
    }

    // Load user's projects
    function loadUserProjects() {
        console.log('[PROJECTS LIST] Fetching projects for user:', currentUserId);

        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/projects',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();
                console.log('[PROJECTS LIST] Projects response:', response);

                if (response.success) {
                    allProjects = response.projects || [];
                    console.log('[PROJECTS LIST] Number of projects:', allProjects.length);

                    // Get the DataTable instance (older API)
                    var table = $('#projects-table').dataTable();

                    // Clear existing data
                    table.fnClearTable();

                    if (allProjects.length === 0) {
                        $('#remove-all-btn').hide();
                    } else {
                        $('#remove-all-btn').show();

                        // Build rows array for fnAddData
                        var rows = [];
                        $.each(allProjects, function(index, project) {
                            var projectName = project.name || 'N/A';
                            var projectCode = project.code || 'N/A';
                            var customerName = project.customer_name || 'N/A';
                            var customerCode = project.customer_code || 'N/A';

                            rows.push([
                                '', // Add column (empty for assigned projects)
                                '<center><input type="checkbox" name="remove_' + project.id + '" value="' + project.id + '" onchange="toggleRemove(\'' + project.id + '\', this.checked)"></center>',
                                '<a href="/d3-static/project-details.html?projectId=' + project.id + '">' + escapeHtml(projectName) + '</a>',
                                escapeHtml(projectCode),
                                escapeHtml(customerName),
                                escapeHtml(customerName),
                                escapeHtml(customerCode)
                            ]);
                        });

                        // Add all rows at once
                        if (rows.length > 0) {
                            table.fnAddData(rows);
                        }
                    }
                } else {
                    console.error('[PROJECTS LIST] Failed to load projects:', response.error);
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                console.error('[PROJECTS LIST] Error fetching projects:', error);
                console.error('[PROJECTS LIST] Response:', xhr.responseText);
            }
        });
    }

    // Toggle project removal selection
    function toggleRemove(projectId, checked) {
        console.log('[PROJECTS LIST] Toggle remove:', projectId, checked);
        if (checked) {
            if (projectsToRemove.indexOf(projectId) === -1) {
                projectsToRemove.push(projectId);
            }
        } else {
            var idx = projectsToRemove.indexOf(projectId);
            if (idx > -1) {
                projectsToRemove.splice(idx, 1);
            }
        }
        console.log('[PROJECTS LIST] Projects to remove:', projectsToRemove);
    }

    // Remove all projects
    function removeAllProjects() {
        if (!confirm('Are you sure you want to remove ALL projects from this user?')) {
            return;
        }

        console.log('[PROJECTS LIST] Removing all projects for user:', currentUserId);
        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/projects',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ removeAll: true }),
            success: function(response) {
                hideLoadingIndicator();
                console.log('[PROJECTS LIST] Remove all response:', response);

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('All projects removed successfully');
                    goToByScroll('success-box');

                    // Reload projects
                    projectsToRemove = [];
                    loadUserProjects();
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to remove projects');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                console.error('[PROJECTS LIST] Error removing all projects:', error);
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to remove projects: ' + error);
            }
        });
    }

    // Submit form - remove selected projects
    function onSubmit_projects_list() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');

        if (projectsToRemove.length === 0) {
            $('#warning-box').css('display', 'block');
            $('#warning-title').html('No Changes');
            $('#warning-text').html('No projects selected to remove');
            return;
        }

        console.log('[PROJECTS LIST] Submitting remove for projects:', projectsToRemove);
        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/projects',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ remove: projectsToRemove }),
            success: function(response) {
                hideLoadingIndicator();
                console.log('[PROJECTS LIST] Submit response:', response);

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    var msg = 'Removed ' + projectsToRemove.length + ' project(s) successfully';
                    $('#success-text').html(msg);
                    goToByScroll('success-box');

                    // Reset and reload
                    projectsToRemove = [];
                    loadUserProjects();
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to remove projects');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                console.error('[PROJECTS LIST] Error submitting:', error);
                var errorMsg = 'Failed to remove projects';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
            }
        });
    }
</script>
