<!DOCTYPE html>
<!-- saved from url=(0059)https://d3.truckast.com/dv/v1/dolese/truckast/MarketSummary -->
<html xmlns="http://www.w3.org/1999/xhtml" class="k-webkit k-webkit149">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no">
    <title></title>

    <!-- Required javascript and css all rolled up in one -->
    <script src="./MarketSummary_files/d3_complete_nohc.js"></script>

    <link href="./MarketSummary_files/d3_complete.css" rel="stylesheet" type="text/css">

    <!-- Highcharts -->
    <script src="./MarketSummary_files/highcharts.js"></script>
    <script src="./MarketSummary_files/highcharts-more.js"></script>
    <script src="./MarketSummary_files/data.js"></script>

    <!-- need to rollup into d3_complete upon approval -->
    <script src="./MarketSummary_files/jquery.rateit.min.js"></script>
    <link href="./MarketSummary_files/rateit.css" rel="stylesheet" type="text/css">
    <script src="./MarketSummary_files/hopscotch.min.js"></script>
    <link href="./MarketSummary_files/hopscotch.min.css" rel="stylesheet" type="text/css">
    <script src="./MarketSummary_files/chardinjs.min.js"></script>
    <link href="./MarketSummary_files/chardinjs.css" rel="stylesheet" type="text/css">

    <link href="./MarketSummary_files/bootstrap2-toggle.min.css" rel="stylesheet">
    <script src="./MarketSummary_files/bootstrap2-toggle.min.js"></script> 

    <style media="print" type="text/css">
        a:after {
            content: '';
        }

        a[href]:after {
            content: none !important;
        }
    </style>
</head>

<body>
    <script>
        // document load initialization
        $(document).ready(function () {
            hideLoadingIndicator();
            loadLogin();
        });
        $(window).unload(function () {
            hideLoadingIndicator();
            saveLogin();
        });
    </script>

    <script type="text/javascript">
        $(document).ready(function () {
            var errormsg = getParameterByName("pageerror");
            if (errormsg != null && errormsg.length > 0) {
                displayError('ERROR', trimString(errormsg));
            }
            Highcharts.setOptions({
                colors: ['#7cb5ec', '#434348', '#90ed7d', '#f7a35c', '#8085e9', '#f15c80', '#e4d354', '#8085e8', '#8d4653', '#91e8e1']
            });
        });
    </script>
    <div class="d3-page">

        <div class="navbar navbar-fixed-top navbar-inverse">
            <div class="navbar-inner">
                <div class="container">
                    <a class="btn btn-navbar" data-toggle="collapse" data-target=".nav-collapse">
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </a>

                    <a id="header-bar-title" class="brand" href="/">TRUCKAST</a>

                    <div class="nav-collapse collapse">
                        <ul class="nav">
                            <li><a href="/">MARKETS</a></li>
                            <li><a href="/settings">SETTINGS</a></li>
                            <li><a href="/publish">PUBLISH</a></li>
                            <li><a href="/admin">ADMIN</a></li>
                            <li><a href="/order-request">ORDER</a></li>
                            <li><a href="/rollout-search">ROLLOUT</a></li>
                            <li><a href="/projects">PROJECTS</a></li>
                            <li><a href="/help">HELP</a></li>
                            <li><a href="/logout">LOGOUT</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div id="error-box" class="alert alert-error" style="display: none">
                <h4 id="error-title" style="margin-bottom: 5px">Error!</h4>
                <p id="error-text"></p>
            </div>
            <div id="warning-box" class="alert alert-block" style="display: none">
                <h4 id="warning-title" style="margin-bottom: 5px">Warning!</h4>
                <p id="warning-text"></p>
            </div>
            <div id="success-box" class="alert alert-success" style="display: none">
                <h4 id="success-title" style="margin-bottom: 5px">Success!</h4>
                <p id="success-text"></p>
            </div>
            <div id="information-box" class="alert alert-info" style="display: none">
                <h4 id="information-title" style="margin-bottom: 5px">Additional Information:</h4>
                <p id="information-text"></p>
            </div>

            <form id="market-summary" method="POST">

                <div class="navbar">
                    <div class="navbar-inner">
                        <div class="container">
                            <table style="width:100%">
                                <tbody>
                                    <tr>
                                        <td style="width:38px">
                                            <a onclick="history.back();hideLoadingIndicator();" style="cursor:pointer">
                                                <img id="titlebar-left-image" width="32" height="32"
                                                    style="margin-top:5px; margin-bottom:5px"
                                                    src="./MarketSummary_files/arrow-big-01@2x.png">
                                            </a>
                                        </td>
                                        <td>
                                            <div style="width: 100%; float: left; text-align: center; vertical-align: central">
                                                <div id="titlebar-caption" style="display: inline-block; margin:5px">
                                                    <span style="font-size: 16px"><strong>Dolese Orders</strong></span><br>
                                                    <span style="font-size: 11px; padding: 0"><strong></strong></span>
                                                </div>
                                            </div>
                                        </td>
                                        <td style="width:38px">
                                            <a style="cursor:pointer" onclick="if(window.d3Refresh)d3Refresh();return false;">
                                                <img id="titlebar-right-image" width="32" height="32"
                                                    style="margin-top:5px; margin-bottom:5px"
                                                    src="./MarketSummary_files/arrow-small-27@2x.png">
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div id="Header" class="d3-label" style="width: 100%;"></div>

                <select id="daterangeurl" name="daterangeurl"
                    style="width: 100%; margin-bottom: 0; display: block;"></select>
                <br>

                <!-- Invite / order-concrete promo tiles (static) -->
                <div id="invitetilevis" style="width: 100%; display: block">
                    <div style="width: 100%; height: 1px; clear: both"></div>
                    <div id="invitetilevis-tiles" style="display: inline-block;">
                        <div class="tile"
                            style="position: relative; background-color: rgb(47, 126, 216); cursor: pointer; display: block;"
                            onclick="window.top.location.href='/rollout-search'">
                            <img src="./MarketSummary_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px;">
                            <div class="tileContainer">
                                <div class="tileIcon"><img src="./MarketSummary_files/contractor.png"></div>
                                <div class="tileInfoSection">
                                    <div class="tileCell">
                                        <div class="tileSuperTitle">EASY</div>
                                        <div class="tileTitle">CUSTOMER</div>
                                        <div class="tileSubTitle">INVITE</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="tile"
                            style="position: relative; background-color: rgb(47, 126, 216); cursor: pointer; display: block;"
                            onclick="window.top.location.href='/order-by-project'">
                            <img src="./MarketSummary_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px;">
                            <div class="tileContainer">
                                <div class="tileIcon"><img src="./MarketSummary_files/fill_form64.png"></div>
                                <div class="tileInfoSection">
                                    <div class="tileCell">
                                        <div class="tileSuperTitle">Click Here</div>
                                        <div class="tileTitle">ORDER CONCRETE</div>
                                        <div class="tileSubTitle">Its Easy</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Business-unit summary tiles (fuel promo + DOLESE pie) — rendered live -->
                <div id="tiles" style="width: 100%; display: block">
                    <input id="tiles-search" type="text" placeholder="Search" style="width: 260px; display: block">
                    <div style="width: 100%; height: 1px; clear: both"></div>
                    <div id="tiles-tiles" style="display: inline-block;"></div>
                </div>

            </form>
        </div>

    </div>

    <script src="/d3-static/market-live.js?v=3"></script>
</body>

</html>
