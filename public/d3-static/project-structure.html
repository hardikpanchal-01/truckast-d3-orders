<script>
    var projectId = null;
    var projectName = '';

    // Get URL parameters
    function getUrlParams() {
        var urlParams = new URLSearchParams(window.location.search);
        return {
            projectId: urlParams.get('projectId') || urlParams.get('ProjectID') || urlParams.get('id')
        };
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Load project info
    function loadProjectInfo() {
        var params = getUrlParams();
        projectId = params.projectId;

        if (!projectId) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('Error');
            $('#error-text').html('Missing project ID');
            return;
        }

        $('#projectId').val(projectId);

        // Get project name
        $.ajax({
            url: '/api/projects/' + encodeURIComponent(projectId) + '/details',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                if (response.success && response.project) {
                    projectName = response.project.name || 'PROJECT';
                    $('#page-title').html('<strong>ADD COMPANY TO ' + escapeHtml(projectName).toUpperCase() + '</strong>');
                    document.title = 'Add Company - ' + projectName;
                }
            },
            error: function() {
                // Continue without project name
            }
        });
    }

    // Search for customers
    function onSubmit_search() {
        var searchText = $('#searchtext').val().trim();

        if (!searchText) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('Error');
            $('#error-text').html('Please enter a customer name or number to search');
            return;
        }

        // Hide error box
        $('#error-box').css('display', 'none');

        showLoadingIndicator();

        $.ajax({
            url: '/api/customers/search?q=' + encodeURIComponent(searchText),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.error) {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error);
                    return;
                }

                renderResults(response.customers || response.results || []);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to search: ' + error);
            }
        });
    }

    // Render search results
    function renderResults(customers) {
        var html = '';

        if (!customers || customers.length === 0) {
            html = '<div class="tile" style="position: relative; background-color: #ffffff; cursor: default">' +
                    '<img src="./JobsForFixedNodeID_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: none;" />' +
                    '<div class="tileContainer">' +
                        '<div class="tileIcon"><img src="./JobsForFixedNodeID_files/Cancelled.png" /></div>' +
                        '<div class="tileInfoSection">' +
                            '<div class="tileCell">' +
                                '<div class="tileSuperTitle"></div>' +
                                '<div class="tileTitle">NO RESULTS</div>' +
                                '<div class="tileSubTitle"></div>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
        } else {
            $.each(customers, function(index, customer) {
                var customerId = customer.id;
                var customerName = escapeHtml(customer.name || '');
                var customerCode = escapeHtml(customer.code || '');

                html += '<div class="tile" style="position: relative; background-color: #2f7ed8; cursor: pointer" onclick="addCompanyToProject(\'' + customerId + '\', \'' + customerName.replace(/'/g, "\\'") + '\');">' +
                        '<img src="./JobsForFixedNodeID_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;" />' +
                        '<div class="tileContainer">' +
                            '<div class="tileIcon"><img src="https://d3.truckast.com/Images/Icons/toolbar/white/plus-sign-mini-white@2x.png" /></div>' +
                            '<div class="tileInfoSection">' +
                                '<div class="tileCell">' +
                                    '<div class="tileSuperTitle">' + customerCode + '</div>' +
                                    '<div class="tileTitle">' + customerName.toUpperCase() + '</div>' +
                                    '<div class="tileSubTitle">CLICK TO ADD</div>' +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
            });

            // Show search filter if more than a few results
            if (customers.length > 5) {
                $('#results-search').show();
            } else {
                $('#results-search').hide();
            }
        }

        $('#results-tiles').html(html);
    }

    // Add company to project
    function addCompanyToProject(customerId, companyName) {
        if (!projectId) {
            alert('No project ID');
            return;
        }

        showLoadingIndicator();

        $.ajax({
            url: '/api/projects/' + encodeURIComponent(projectId) + '/companies',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                customer_id: customerId,
                company_name: companyName,
                role: 'general_contractor',
                is_active: true
            }),
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Company added to project successfully!');

                    // Go back after delay
                    setTimeout(function() {
                        history.back();
                    }, 1500);
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to add company');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to add company: ' + error);
            }
        });
    }

    // Search on Enter key
    $('#searchtext').keypress(function(e) {
        if (e.which === 13) {
            onSubmit_search();
            return false;
        }
    });

    // Filter results tiles
    $('#results-search').on('keyup change', function() {
        var filter = $(this).val().toUpperCase();
        if (filter) {
            $('#results-tiles .tile').each(function() {
                var text = $(this).text().toUpperCase();
                $(this).css('display', text.indexOf(filter) > -1 ? 'block' : 'none');
            });
        } else {
            $('#results-tiles .tile').css('display', 'block');
        }
    });

    // Initialize
    $(document).ready(function() {
        loadProjectInfo();
    });
</script>

    </div>
