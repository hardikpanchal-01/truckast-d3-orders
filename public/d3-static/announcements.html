    <script type="text/javascript">
        // Get announcement ID from URL
        function getParameterByName(name) {
            var url = window.location.href;
            name = name.replace(/[\[\]]/g, '\\$&');
            var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
            var results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }

        $(document).ready(function() {
            var id = getParameterByName('id');

            if (id) {
                // Fetch announcement data from API
                $.ajax({
                    url: '/api/announcements/' + id,
                    type: 'GET',
                    success: function(response) {
                        if (response.success && response.data) {
                            var announcement = response.data;

                            // Set title
                            var name = announcement.name || 'ANNOUNCEMENT';
                            $('#announcement-title').html('<strong>' + name.toUpperCase() + '</strong>');
                            document.title = name + ' - Truckast';

                            // Set message content - just convert </br> to <br>
                            var messageDetails = announcement.message_details || '';
                            var htmlContent = messageDetails.replace(/<\/br>/gi, '<br>');

                            $('#announcement-message').html(htmlContent);
                        } else {
                            $('#announcement-title').html('<strong>ERROR</strong>');
                            $('#announcement-message').html('Announcement not found.');
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('Error loading announcement:', error);
                        $('#announcement-title').html('<strong>ERROR</strong>');
                        $('#announcement-message').html('Failed to load announcement details.');
                    }
                });
            } else {
                $('#announcement-title').html('<strong>ERROR</strong>');
                $('#announcement-message').html('No announcement ID provided.');
            }
        });
    </script>
