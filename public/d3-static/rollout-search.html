<script>
    function onValidate_search() {
        var message = "";
        return message;
    }

    // Create a tile for a customer
    function createCustomerTile(customer) {
        var userCount = customer.user_count || 0;
        var bgColor = '#458b00'; // D3 green - same as production
        var code = customer.code || '';
        var name = customer.name || '';
        var href = '/rollout-customer-details?id=' + customer.id;

        var tile = '<a href="' + href + '" style="text-decoration: none;">' +
            '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: pointer; display: block;">' +
                '<img src="/d3-static/JobsForFixedNodeID_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;">' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon">' +
                        '<img src="/d3-static/JobsForFixedNodeID_files/Completed.png" style="max-width: 72px; max-height: 80px;">' +
                    '</div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">#' + code + '</div>' +
                            '<div class="tileTitle">' + name + '</div>' +
                            '<div class="tileSubTitle">' + userCount + ' USERS</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</a>';

        return tile;
    }

    // Create "No Results" tile
    function createNoResultsTile() {
        return '<div class="tile" style="position: relative; background-color: rgb(255, 255, 255); cursor: default; display: block;">' +
                '<img src="/d3-static/JobsForFixedNodeID_files/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: none;">' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="/d3-static/JobsForFixedNodeID_files/Cancelled.png" style="max-width: 72px; max-height: 80px;"></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle"></div>' +
                            '<div class="tileTitle">NO RESULTS</div>' +
                            '<div class="tileSubTitle"></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    function onSubmit_search() {
        // Hide all alert boxes first
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate
        var validationMessage = onValidate_search();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        var searchText = $('#searchtext').val();
        if (!searchText || searchText.trim().length === 0) {
            $('#results-tiles').html('');
            return;
        }

        // Show loading indicator
        showLoadingIndicator();

        // Search via AJAX
        $.ajax({
            url: '/api/rollout/customers?q=' + encodeURIComponent(searchText),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success && response.data) {
                    var tilesHtml = '';

                    if (response.data.length === 0) {
                        tilesHtml = createNoResultsTile();
                    } else {
                        $.each(response.data, function(index, customer) {
                            tilesHtml += createCustomerTile(customer);
                        });
                    }

                    $('#results-tiles').html(tilesHtml);
                } else {
                    $('#results-tiles').html(createNoResultsTile());
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to search: ' + error);
                goToByScroll('error-box');
                $('#results-tiles').html(createNoResultsTile());
            }
        });
    }

    // Allow Enter key to trigger search
    $(document).ready(function() {
        $('#searchtext').keypress(function(e) {
            if (e.which === 13) {
                onSubmit_search();
                return false;
            }
        });
    });
</script>
