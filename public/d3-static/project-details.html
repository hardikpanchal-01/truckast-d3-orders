    <link href="./JobsForFixedNodeID_files/hopscotch.min.css" rel="stylesheet" type="text/css">

</head>

<body>
    <script>
        // document load initialization
        $(document).ready(function () {
            hideLoadingIndicator();
            loadLogin();
        });
        $(window).unload(function () {
            hideLoadingIndicator();
            saveLogin();
        });
    </script>

    <script type="text/javascript">
        $(document).ready(function () {
            var errormsg = getParameterByName("pageerror");
            if (errormsg != null && errormsg.length > 0) {
                displayError('ERROR', trimString(errormsg));
            }
            Highcharts.setOptions({
                colors: ['#7cb5ec', '#434348', '#90ed7d', '#f7a35c', '#8085e9', '#f15c80', '#e4d354', '#8085e8', '#8d4653', '#91e8e1']
            });
        });
    </script>
    <div class="d3-page">

        <div class="navbar navbar-fixed-top navbar-inverse">
            <div class="navbar-inner">
                <div class="container">
                    <a class="btn btn-navbar" data-toggle="collapse" data-target=".nav-collapse">
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </a>

                    <a id="header-bar-title" class="brand">PROJECTS</a>

                    <div class="nav-collapse collapse">
                        <ul class="nav">
                            <li><a href="/d3-static/user-search.html">ADMIN</a></li>
                            <li><a href="/">TRUCKAST</a></li>
                            <li><a href="/settings">SETTINGS</a></li>
                            <li><a href="/login">LOGOUT</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div id="error-box" class="alert alert-error" style="display: none">
                <h4 id="error-title" style="margin-bottom: 5px">Error!</h4>
                <p id="error-text"></p>
            </div>
            <div id="warning-box" class="alert alert-block" style="display: none">
                <h4 id="warning-title" style="margin-bottom: 5px">Warning!</h4>
                <p id="warning-text"></p>
            </div>
            <div id="success-box" class="alert alert-success" style="display: none">
                <h4 id="success-title" style="margin-bottom: 5px">Success!</h4>
                <p id="success-text"></p>
            </div>
            <div id="information-box" class="alert alert-info" style="display: none">
                <h4 id="information-title" style="margin-bottom: 5px">Additional Information:</h4>
                <p id="information-text"></p>
            </div>

            <form id="project-details" method="POST" onsubmit="return false;">
                <input type="hidden" name="projectId" id="projectId" value="" />

                <div class="navbar">
                    <div class="navbar-inner">
                        <div class="container">
                            <table style="width:100%">
                                <tbody>
                                    <tr>
                                        <td style="width:38px">
                                            <a onclick="history.back(); hideLoadingIndicator(); return false;" style="cursor:pointer">
                                                <img id="titlebar-left-image" width="32" height="32" style="margin-top:5px; margin-bottom:5px" src="./JobsForFixedNodeID_files/arrow-big-01@2x.png">
                                            </a>
                                        </td>
                                        <td>
                                            <div style="width: 100%; float: left; text-align: center; vertical-align: central">
                                                <div id="titlebar-caption" style="display: inline-block; margin:5px">
                                                    <span id="project-title" style="font-size: 16px"><strong>Loading...</strong></span><br>
                                                    <span style="font-size: 11px; padding: 0"><strong></strong></span>
                                                </div>
                                            </div>
                                        </td>
                                        <td style="width:38px">
                                            <a href="javascript:location.reload();">
                                                <img id="titlebar-right-image" width="32" height="32" style="margin-top:5px; margin-bottom:5px" src="./JobsForFixedNodeID_files/arrow-small-27@2x.png">
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <br>

                <!-- Add Company Button -->
                <a id="add-company-btn" href="#" class="btn btn-success" style="width: 90px; display: inline-block">+ COMPANY</a>

                <br>

                <!-- COMPANIES Section -->
                <div id="company-label" class="d3-label" style="width: 100%;"><h4>COMPANIES</h4></div>

                <div id="companies-container" style="width: 100%; display: block">
                    <input id="companies-search" type="text" placeholder="Search" style="width: 260px; display: none">
                    <div style="width: 100%; height: 1px; clear: both"></div>
                    <div id="companies-tiles" style="display: inline-block;">
                        <!-- Company tiles will be loaded here -->
                    </div>
                </div>

                <button id="companies-submit-button" class="btn btn-danger" type="button" onclick="onSubmit_form()" style="width: 150px">SUBMIT</button>

                <!-- INVITE NEW USER Section -->
                <div class="d3-label" style="width: 100%;"><h4>INVITE NEW USER</h4></div>

                <div id="invite-container" style="width: 100%; display: block">
                    <div id="invite-tiles" style="display: inline-block;">
                        <!-- Invite tiles will be loaded here -->
                    </div>
                </div>

                <!-- CURRENT USERS Section -->
                <div id="current-users-label" class="d3-label" style="width: 100%;"><h4>CURRENT USERS FOR PROJECT</h4></div>

                <div style="display: block; width: 100%">
                    <table cellpadding="0" cellspacing="0" border="0" class="table table-striped table-bordered" id="users-table" style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Remove from Project</th>
                                <th>Name</th>
                                <th>Company</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <!-- Users will be loaded here -->
                        </tbody>
                    </table>
                </div>

                <!-- PRODUCTS Section -->
                <div id="products-label" class="d3-label" style="width: 100%;"><h4>PRODUCTS</h4></div>

                <div id="products-container" style="width: 100%; display: block">
                    <input id="products-search" type="text" placeholder="Search" style="width: 260px; display: block">
                    <div style="width: 100%; height: 1px; clear: both"></div>
                    <div id="products-tiles" style="display: inline-block;">
                        <!-- Product tiles will be loaded here -->
                    </div>
                </div>

            </form>

<script>
    // Asset path for images
    var ASSET = "/d3-static/JobsForFixedNodeID_files";

    // Tile colors
    var COLORS = {
        blue: '#2f7ed8',
        green: '#458b00',
        red: '#c43926'
    };

    // Store data
    var currentProjectId = null;
    var projectData = null;
    var usersToRemove = [];

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Get project ID from URL
    function getProjectIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('projectId') || params.get('ProjectID') || params.get('id');
    }

    // Tile click handler
    function tileInvoke(url) {
        showLoadingIndicator();
        window.location.href = url;
    }

    // Create a company tile
    function createCompanyTile(company) {
        var bgColor = COLORS.blue;
        var iconSrc = 'https://d3.truckast.com/Images/Icons/toolbar/white/pencil-mini-white@2x.png';
        var roleType = escapeHtml(company.role_type || 'GENERAL CONTRACTOR');
        var companyName = escapeHtml(company.name || '');
        // Always show added date
        var addedDate = 'ADDED: ' + (company.added_date ? formatDate(company.added_date) : formatDate(new Date().toISOString()));
        var href = '/d3-static/add-to-project.html?projectId=' + currentProjectId + '&companyId=' + company.id;

        return '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: pointer" onclick="tileInvoke(\'' + href + '\');">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + iconSrc + '" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">' + roleType + '</div>' +
                            '<div class="tileTitle">' + companyName.toUpperCase() + '</div>' +
                            '<div class="tileSubTitle">' + addedDate + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    // Create an invite tile
    function createInviteTile(company) {
        var bgColor = COLORS.green;
        var iconSrc = 'https://d3.truckast.com/Images/Icons/toolbar/white/plus-sign-mini-white@2x.png';
        var roleType = escapeHtml(company.role_type || 'GENERAL CONTRACTOR');
        var companyName = escapeHtml(company.name || '');
        var href = '/d3-static/invite-to-company.html?customerId=' + company.id + '&projectId=' + currentProjectId;

        return '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: pointer" onclick="tileInvoke(\'' + href + '\');">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: block;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + iconSrc + '" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">' + roleType + '</div>' +
                            '<div class="tileTitle">' + companyName.toUpperCase() + '</div>' +
                            '<div class="tileSubTitle">INVITE NEW USER</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    // Create a product tile
    function createProductTile(product) {
        var bgColor = product.is_concrete ? COLORS.green : COLORS.blue;
        var iconSrc = ASSET + '/Completed.png';
        var productCode = escapeHtml(product.code || '');
        var productName = escapeHtml(product.name || '');
        var quantity = (product.quantity || 0).toFixed(2) + ' ' + (product.unit || 'CY');

        return '<div class="tile" style="position: relative; background-color: ' + bgColor + '; cursor: default">' +
                '<img src="' + ASSET + '/dogear.png" style="position: absolute; right: 0px; bottom: 0px; display: none;" />' +
                '<div class="tileContainer">' +
                    '<div class="tileIcon"><img src="' + iconSrc + '" /></div>' +
                    '<div class="tileInfoSection">' +
                        '<div class="tileCell">' +
                            '<div class="tileSuperTitle">' + productCode + ' (' + productName + ')</div>' +
                            '<div class="tileTitle">' + quantity + '</div>' +
                            '<div class="tileSubTitle"></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
    }

    // Format date
    function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
    }

    // Load project details
    function loadProjectDetails() {
        currentProjectId = getProjectIdFromUrl();
        if (!currentProjectId) {
            $('#project-title').html('<strong>ERROR</strong>');
            $('#companies-tiles').html('<div>No Project ID provided</div>');
            return;
        }

        $('#projectId').val(currentProjectId);
        $('#add-company-btn').attr('href', '/d3-static/project-structure.html?projectId=' + currentProjectId);

        showLoadingIndicator();

        $.ajax({
            url: '/api/projects/' + currentProjectId + '/details',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success && response.project) {
                    projectData = response.project;
                    var projectName = projectData.name || 'Unknown Project';

                    $('#project-title').html('<strong>' + escapeHtml(projectName) + '</strong>');
                    $('#current-users-label h4').text('CURRENT USERS FOR ' + projectName.toUpperCase());
                    document.title = projectName + ' - Project Details';

                    // Render companies
                    renderCompanies(response.companies || []);

                    // Render invite tiles
                    renderInviteTiles(response.companies || []);

                    // Render users
                    var usersList = response.users || [];
                    renderUsers(usersList);

                    // Render products
                    renderProducts(response.products || []);

                    // Initialize DataTable only if there are users
                    if ($.fn.dataTable && usersList.length > 0) {
                        $('#users-table').dataTable({
                            "sDom": "<'row'<'span6'l><'span6'f>r>t<'row'<'span6'><'span6'p>>",
                            "sPaginationType": "bootstrap",
                            "bPaginate": false,
                            "bFilter": true,
                            "bSort": true,
                            "oLanguage": {
                                "sLengthMenu": "_MENU_ records per page"
                            }
                        });
                    }

                    // Setup product search
                    setupProductSearch();
                } else {
                    $('#project-title').html('<strong>ERROR</strong>');
                    $('#companies-tiles').html('<div>Project not found</div>');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to load project details';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#project-title').html('<strong>Project Not Found</strong>');
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
                // Hide sections when project not found
                $('#add-company-btn').hide();
                $('#companies-container').hide();
                $('#invite-container').hide();
                $('#users-table').hide();
                $('#products-container').hide();
                $('#submit-button').hide();
                $('[class="d3-label"]').hide();
            }
        });
    }

    // Render companies
    function renderCompanies(companies) {
        var html = '';
        if (companies.length === 0) {
            html = '<div style="color: #666; padding: 10px 0;">No companies assigned to this project</div>';
        } else {
            $.each(companies, function(index, company) {
                html += createCompanyTile(company);
            });
        }
        $('#companies-tiles').html(html);
    }

    // Render invite tiles
    function renderInviteTiles(companies) {
        var html = '';
        if (companies.length === 0) {
            html = '<div style="color: #666; padding: 10px 0;">No companies to invite from</div>';
        } else {
            $.each(companies, function(index, company) {
                html += createInviteTile(company);
            });
        }
        $('#invite-tiles').html(html);
    }

    // Render users
    function renderUsers(users) {
        var html = '';
        if (users.length === 0) {
            // Don't add any rows - just leave empty for DataTables compatibility
            $('#users-table').hide();
            $('#current-users-label').after('<div id="no-users-msg" style="margin-bottom: 20px; color: #666;">No users assigned to this project</div>');
        } else {
            $('#users-table').show();
            $('#no-users-msg').remove();
            $.each(users, function(index, user) {
                var rowClass = (index % 2 === 0) ? 'even gradeA' : 'odd gradeA';
                var editHref = '/d3-static/invite-to-company.html?EditUserID=' + user.id + '&projectId=' + currentProjectId;

                html += '<tr class="' + rowClass + '">';
                html += '<td><input type="checkbox" name="remove_' + user.id + '" value="' + user.id + '" onchange="toggleRemoveUser(\'' + user.id + '\', this.checked)"></td>';
                html += '<td><a href="' + editHref + '">' + escapeHtml(user.name) + '</a></td>';
                html += '<td>' + escapeHtml(user.company_name || '') + '</td>';
                html += '</tr>';
            });
            $('#users-tbody').html(html);
        }
    }

    // Render products
    function renderProducts(products) {
        var html = '';
        if (products.length === 0) {
            html = '<div style="color: #666; padding: 10px 0;">No products for this project</div>';
            $('#products-search').hide();
        } else {
            $('#products-search').show();
            $.each(products, function(index, product) {
                html += createProductTile(product);
            });
        }
        $('#products-tiles').html(html);
    }

    // Setup product search
    function setupProductSearch() {
        $('#products-search').on('keyup change', function() {
            var filter = $(this).val().toUpperCase();
            if (filter) {
                $('#products-tiles .tile').each(function() {
                    var text = $(this).text().toUpperCase();
                    $(this).css('display', text.indexOf(filter) > -1 ? 'block' : 'none');
                });
            } else {
                $('#products-tiles .tile').css('display', 'block');
            }
        });
    }

    // Toggle user removal
    function toggleRemoveUser(userId, checked) {
        if (checked) {
            if (usersToRemove.indexOf(userId) === -1) {
                usersToRemove.push(userId);
            }
        } else {
            var idx = usersToRemove.indexOf(userId);
            if (idx > -1) {
                usersToRemove.splice(idx, 1);
            }
        }
    }

    // Submit form
    function onSubmit_form() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');

        if (usersToRemove.length === 0) {
            $('#warning-box').css('display', 'block');
            $('#warning-title').html('No Changes');
            $('#warning-text').html('No users selected to remove');
            return;
        }

        showLoadingIndicator();

        $.ajax({
            url: '/api/projects/' + currentProjectId + '/users',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                remove: usersToRemove
            }),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Users removed successfully');
                    goToByScroll('success-box');

                    // Reset and reload
                    usersToRemove = [];
                    setTimeout(function() {
                        location.reload();
                    }, 1000);
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to remove users');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to remove users';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
            }
        });
    }

    // Initialize
    $(document).ready(function() {
        loadProjectDetails();
    });
</script>
        </div>

    </div>
    <script type="text/javascript">
    </script>

</body>
