<script>
    // Store data
    var currentUserId = null;
    var currentCustomerId = null;
    var allProjects = [];
    var userProjectIds = [];
    var projectsToAdd = [];
    var projectsToRemove = [];
    var projectsWithOrder = [];

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Get params from URL
    function getUrlParams() {
        var params = new URLSearchParams(window.location.search);
        return {
            userId: params.get('userId') || params.get('EditUserID') || params.get('id'),
            customerId: params.get('customerId') || params.get('CustomerID')
        };
    }

    // Store user name for title
    var currentUserName = '';

    // Load page data
    function loadPageData() {
        var params = getUrlParams();
        currentUserId = params.userId;
        currentCustomerId = params.customerId;

        if (!currentUserId || !currentCustomerId) {
            $('#page-title').html('<strong>ERROR</strong>');
            $('#projects-tbody').html('<tr><td colspan="8">Missing User ID or Customer ID</td></tr>');
            return;
        }

        $('#userId').val(currentUserId);
        $('#customerId').val(currentCustomerId);

        showLoadingIndicator();

        // Load user info first, then load projects
        console.log('[CUSTOMER PROJECTS] Fetching user info...');
        $.ajax({
            url: '/api/admin/users/' + currentUserId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                console.log('[CUSTOMER PROJECTS] User info response:', response);
                if (response.success && response.data) {
                    var firstName = response.data.first_name || '';
                    var lastName = response.data.last_name || '';
                    currentUserName = (firstName + ' ' + lastName).trim() || response.data.name || 'Unknown User';
                }
                // Load customer info and projects after user info
                loadCustomerProjects();
            },
            error: function(xhr, status, error) {
                console.error('[CUSTOMER PROJECTS] Error fetching user info:', error);
                currentUserName = 'Unknown User';
                loadCustomerProjects();
            }
        });
    }

    // Load customer info and projects
    function loadCustomerProjects() {
        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/customer-projects?customerId=' + currentCustomerId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    if (response.customer) {
                        var customerName = response.customer.name || '';
                        $('#page-title').html('<strong>' + escapeHtml(customerName) + ' Projects: ' + escapeHtml(currentUserName) + '</strong>');
                        document.title = customerName + ' Projects';
                    }

                    allProjects = response.projects || [];
                    userProjectIds = (response.userProjects || []).map(function(p) { return String(p.id); });
                    renderProjectsTable(allProjects, response.userProjects || []);

                    // Initialize DataTable
                    if ($.fn.dataTable) {
                        $('#projects-table').dataTable({
                            "sDom": "<'row'<'span6'l><'span6'f>r>t<'row'<'span6'><'span6'p>>",
                            "sPaginationType": "bootstrap",
                            "bPaginate": false,
                            "bFilter": true,
                            "bSort": true,
                            "oLanguage": {
                                "sLengthMenu": "_MENU_ records per page"
                            }
                        });
                    }
                } else {
                    $('#projects-tbody').html('<tr><td colspan="8">Failed to load projects</td></tr>');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#page-title').html('<strong>ERROR</strong>');
                $('#projects-tbody').html('<tr><td colspan="8">Failed to load projects: ' + error + '</td></tr>');
            }
        });
    }

    // Render projects table
    function renderProjectsTable(projects, userProjects) {
        var html = '';

        if (projects.length === 0) {
            html = '<tr><td colspan="8">No projects found for this customer</td></tr>';
        } else {
            $.each(projects, function(index, project) {
                var rowClass = (index % 2 === 0) ? 'even gradeA' : 'odd gradeA';
                var hasAccess = userProjectIds.indexOf(String(project.id)) !== -1;

                // Add checkbox - only enabled if user doesn't have access
                var addCheckbox = '';
                if (!hasAccess) {
                    addCheckbox = '<center><input type="checkbox" name="give_' + project.id + '" value="' + project.id + '" onchange="toggleAdd(\'' + project.id + '\', this.checked)"></center>';
                }

                // Remove checkbox - only shown if user has access
                var removeCheckbox = '';
                if (hasAccess) {
                    removeCheckbox = '<center><input type="checkbox" name="remove_' + project.id + '" value="' + project.id + '" onchange="toggleRemove(\'' + project.id + '\', this.checked)"></center>';
                }

                // ORDER checkbox
                var orderCheckbox = '<center><input type="checkbox" name="ProjectOrdering_' + project.id + '" value="' + project.id + '" onchange="toggleOrder(\'' + project.id + '\', this.checked)"></center>';

                // Project owner (customer name)
                var projectOwner = project.customer_name || '';

                html += '<tr class="' + rowClass + '">';
                // Project detail link
                var projectHref = '/d3-static/project-details.html?projectId=' + project.id;

                html += '<td style="">' + addCheckbox + '</td>';
                html += '<td style="">' + removeCheckbox + '</td>';
                html += '<td style=""><a href="' + projectHref + '">' + escapeHtml(project.name) + '</a></td>';
                html += '<td style="">' + escapeHtml(project.code || '') + '</td>';
                html += '<td style="">' + escapeHtml(projectOwner) + '</td>';
                html += '<td style=""></td>'; // User Assigned Customer
                html += '<td style=""></td>'; // Customer Number
                html += '<td style="">' + orderCheckbox + '</td>';
                html += '</tr>';
            });
        }

        $('#projects-tbody').html(html);
    }

    // Toggle add project selection
    function toggleAdd(projectId, checked) {
        if (checked) {
            if (projectsToAdd.indexOf(projectId) === -1) {
                projectsToAdd.push(projectId);
            }
        } else {
            var idx = projectsToAdd.indexOf(projectId);
            if (idx > -1) {
                projectsToAdd.splice(idx, 1);
            }
        }
    }

    // Toggle remove project selection
    function toggleRemove(projectId, checked) {
        if (checked) {
            if (projectsToRemove.indexOf(projectId) === -1) {
                projectsToRemove.push(projectId);
            }
        } else {
            var idx = projectsToRemove.indexOf(projectId);
            if (idx > -1) {
                projectsToRemove.splice(idx, 1);
            }
        }
    }

    // Toggle order access selection
    function toggleOrder(projectId, checked) {
        if (checked) {
            if (projectsWithOrder.indexOf(projectId) === -1) {
                projectsWithOrder.push(projectId);
            }
        } else {
            var idx = projectsWithOrder.indexOf(projectId);
            if (idx > -1) {
                projectsWithOrder.splice(idx, 1);
            }
        }
    }

    // Submit form
    function onSubmit_form() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');

        if (projectsToAdd.length === 0 && projectsToRemove.length === 0) {
            $('#warning-box').css('display', 'block');
            $('#warning-title').html('No Changes');
            $('#warning-text').html('No projects selected to add or remove');
            return;
        }

        console.log('[CUSTOMER PROJECTS] Submitting changes - Add:', projectsToAdd, 'Remove:', projectsToRemove);
        showLoadingIndicator();

        // Create add items with customer_id
        var addItems = projectsToAdd.map(function(projectId) {
            return { project_id: projectId, customer_id: currentCustomerId };
        });

        $.ajax({
            url: '/api/admin/users/' + currentUserId + '/projects',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                add: addItems,
                remove: projectsToRemove,
                order: projectsWithOrder,
                role: $('#companytypeid').val()
            }),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    var msg = '';
                    if (response.added > 0) msg += 'Added ' + response.added + ' project(s). ';
                    if (response.removed > 0) msg += 'Removed ' + response.removed + ' project(s).';
                    if (!msg) msg = 'Changes saved successfully';
                    $('#success-text').html(msg);
                    goToByScroll('success-box');

                    // Reset and reload
                    projectsToAdd = [];
                    projectsToRemove = [];
                    projectsWithOrder = [];

                    // Reload the projects
                    setTimeout(function() {
                        loadCustomerProjects();
                    }, 500);
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to update projects');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to update projects';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
            }
        });
    }

    // Initialize
    $(document).ready(function() {
        loadPageData();
    });
</script>
