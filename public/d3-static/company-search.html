<div style="display: block; width: 100%">

<script>
    var dataTable = null;

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Create a table row for a customer
    function createCustomerRow(customer) {
        var code = escapeHtml(customer.code || '');
        var name = escapeHtml(customer.name || '');
        var address = escapeHtml(customer.address || '');
        var city = escapeHtml(customer.city || '');
        var state = escapeHtml(customer.state || '');
        var customerId = customer.id;

        var detailUrl = '/d3-static/company-details.html?id=' + customerId;

        var row = '<tr class="gradeA" style="cursor: pointer" onclick="window.location.href=\'' + detailUrl + '\'">' +
            '<td>' + code + '</td>' +
            '<td><a href="' + detailUrl + '">' + name + '</a></td>' +
            '<td>' + address + '</td>' +
            '<td>' + city + '</td>' +
            '<td>' + state + '</td>' +
            '</tr>';

        return row;
    }

    // Search customers
    function onSubmit_companysearch() {
        // Hide all alert boxes first
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        var searchText = $('#searchtext').val();
        if (!searchText || searchText.trim().length === 0) {
            $('#results-tbody').html('');
            if (dataTable) {
                dataTable.fnClearTable();
            }
            return;
        }

        // Show loading indicator
        showLoadingIndicator();

        // Search via AJAX
        $.ajax({
            url: '/api/admin/customers?q=' + encodeURIComponent(searchText),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success && response.data) {
                    var rowsHtml = '';

                    if (response.data.length === 0) {
                        rowsHtml = '<tr><td colspan="5" style="text-align: center">No results found</td></tr>';
                    } else {
                        $.each(response.data, function(index, customer) {
                            rowsHtml += createCustomerRow(customer);
                        });
                    }

                    // Clear and repopulate table
                    if (dataTable) {
                        dataTable.fnDestroy();
                    }
                    $('#results-tbody').html(rowsHtml);

                    // Reinitialize DataTable
                    dataTable = $('#results-table').dataTable({
                        "sDom": "<'row'<'span6'l><'span6'f>r>t<'row'<'span6'i><'span6'p>>",
                        "sPaginationType": "bootstrap",
                        "bPaginate": true,
                        "bFilter": true,
                        "bSort": true,
                        "iDisplayLength": 10,
                        "oLanguage": {
                            "sLengthMenu": "_MENU_ records per page"
                        }
                    });
                } else {
                    $('#results-tbody').html('<tr><td colspan="5" style="text-align: center">No results found</td></tr>');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to search: ' + error);
            }
        });
    }

    // Allow Enter key to trigger search
    $(document).ready(function() {
        // Initialize DataTable
        dataTable = $('#results-table').dataTable({
            "sDom": "<'row'<'span6'l><'span6'f>r>t<'row'<'span6'i><'span6'p>>",
            "sPaginationType": "bootstrap",
            "bPaginate": true,
            "bFilter": true,
            "bSort": true,
            "iDisplayLength": 10,
            "oLanguage": {
                "sLengthMenu": "_MENU_ records per page"
            }
        });

        $('#searchtext').keypress(function(e) {
            if (e.which === 13) {
                onSubmit_companysearch();
                return false;
            }
        });

        // Filter results
        $('#resultsfilter').keyup(function() {
            if (dataTable) {
                dataTable.fnFilter($(this).val());
            }
        });
    });
</script>
