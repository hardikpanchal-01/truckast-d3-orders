<!-- Results Section (D3 style) -->
<div id="results-container" style="width: 100%; display: block">

<script>
    // ---------- Searching Functionality (D3 style) ---------- //
    (function($) {
        jQuery.expr[':'].Contains = function(a, i, m) {
            return (a.textContent || a.innerText || "").toUpperCase().indexOf(m[3].toUpperCase()) >= 0;
        };

        function listFilter() {
            $('#resultsfilter').change(function () {
                var filter = $(this).val();
                if (filter) {
                    $('#results-tiles').children(".tile:not(:Contains(" + filter + "))").css('display', 'none');
                    $('#results-tiles').children(".tile:Contains(" + filter + ")").css('display', 'block');
                }
                else {
                    $('#results-tiles .tile').css('display', 'block');
                }
                return false;
            }).keyup(function () { $(this).change(); });
        }

        $(function() {
            listFilter();
        });
    }(jQuery));

    // ---------- Pageshow Event Handler ---------- //
    window.addEventListener("pageshow", function(evt){
        var filter = $('#resultsfilter').val();
        if (filter) {
            $('#results-tiles').children(".tile:not(:Contains(" + filter + "))").css('display', 'none');
            $('#results-tiles').children(".tile:Contains(" + filter + ")").css('display', 'block');
        }
        else {
            $('#results-tiles .tile').css('display', 'block');
        }
    }, false);

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Create a tile for a customer (D3 style)
    function createCustomerTile(customer) {
        var name = escapeHtml(customer.name || '');
        var code = escapeHtml(customer.code || '');
        var customerId = customer.id;

        var detailUrl = '/d3-static/company-details.html?id=' + customerId;

        var tile = '<div class="tile" style="position: relative; background-color: #ffffff; cursor: pointer" onclick="window.location.href=\'' + detailUrl + '\'">' +
            '<div class="tileContainer">' +
            '<div class="tileIcon" style="background-color: #3498db; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold;">' + (code.charAt(0) || 'C') + '</div>' +
            '<div class="tileInfoSection">' +
            '<div class="tileCell">' +
            '<div class="tileSuperTitle">' + code + '</div>' +
            '<div class="tileTitle">' + name + '</div>' +
            '<div class="tileSubTitle"></div>' +
            '</div>' +
            '</div>' +
            '</div>' +
            '</div>';

        return tile;
    }

    // Create no results tile (D3 style)
    function createNoResultsTile() {
        return '<div class="tile" style="position: relative; background-color: #ffffff; cursor: default">' +
            '<div class="tileContainer">' +
            '<div class="tileIcon" style="background-color: #e74c3c; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold;">X</div>' +
            '<div class="tileInfoSection">' +
            '<div class="tileCell">' +
            '<div class="tileSuperTitle"></div>' +
            '<div class="tileTitle">NO RESULTS</div>' +
            '<div class="tileSubTitle"></div>' +
            '</div>' +
            '</div>' +
            '</div>' +
            '</div>';
    }

    // Search customers
    function onSubmit_companysearch() {
        // Hide all alert boxes first
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        var searchText = $('#searchtext').val();
        if (!searchText || searchText.trim().length === 0) {
            $('#results-tiles').html('');
            return;
        }

        // Show loading indicator
        showLoadingIndicator();

        // Search via AJAX
        $.ajax({
            url: '/api/admin/customers?q=' + encodeURIComponent(searchText),
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                var tilesHtml = '';

                if (response.success && response.data && response.data.length > 0) {
                    $.each(response.data, function(index, customer) {
                        tilesHtml += createCustomerTile(customer);
                    });
                } else {
                    tilesHtml = createNoResultsTile();
                }

                $('#results-tiles').html(tilesHtml);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to search: ' + error);
            }
        });
    }

    // Allow Enter key to trigger search
    $(document).ready(function() {
        $('#searchtext').keypress(function(e) {
            if (e.which === 13) {
                onSubmit_companysearch();
                return false;
            }
        });
    });
</script>
