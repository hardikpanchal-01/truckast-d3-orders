<script type="text/javascript">
    // Load campaigns via AJAX
    function loadCampaigns() {
        $.ajax({
            url: '/api/campaigns',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                if (response.success && response.data) {
                    var $select = $('#campaign');
                    // Keep first option
                    $select.find('option:not(:first)').remove();
                    // Add campaigns
                    $.each(response.data, function(index, campaign) {
                        var displayText = campaign.name;
                        if (campaign.description) {
                            displayText += ' (' + campaign.description + ')';
                        }
                        $select.append($('<option>', {
                            value: campaign.id,
                            text: displayText
                        }));
                    });

                    // Check if there's a CampaignID in URL
                    var campaignId = getParameterByName('CampaignID');
                    if (campaignId) {
                        $('#campaign').val(campaignId);
                        loadCampaignDetails(campaignId);
                    }
                }
            },
            error: function(xhr, status, error) {
                console.error('Error loading campaigns:', error);
            }
        });
    }

    // Load campaign details when selected
    function loadCampaignDetails(campaignId) {
        if (!campaignId) {
            $('#name').val('');
            $('#description').val('');
            return;
        }

        $.ajax({
            url: '/api/campaigns/' + campaignId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                if (response.success && response.data) {
                    $('#name').val(response.data.name || '');
                    $('#description').val(response.data.description || '');
                }
            },
            error: function(xhr, status, error) {
                console.error('Error loading campaign details:', error);
            }
        });
    }

    $(document).ready(function () {
        $('#campaign').change(function () {
            var value = $('#campaign').val();
            if (value) {
                // Load campaign details via AJAX
                loadCampaignDetails(value);
            } else {
                // Clear form
                $('#name').val('');
                $('#description').val('');
            }
        });
    });

<script>
    function onValidate_campaign_form() {
        // these are necessary instantiations, do not remove
        var message = "";
        var regex;
        var input;

        // Validate name is required
        var name = $('#name').val();
        if (!name || name.trim().length === 0) {
            message += "Campaign name is required.<br>";
        }

        return message;
    }

    function onSubmit_campaign_form() {

        // Hide all alert boxes first
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // validate the form content
        var validationMessage = onValidate_campaign_form();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        // Get form data
        var campaignId = $('#campaign').val();
        var name = $('#name').val();
        var description = $('#description').val();

        // Prepare data
        var data = {
            name: name,
            description: description
        };

        // gray out the screen while the postback occurs...
        showLoadingIndicator();

        // Determine if this is create or update
        if (campaignId && campaignId.length > 0) {
            // UPDATE existing campaign via AJAX
            $.ajax({
                url: '/api/campaigns/' + campaignId,
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(data),
                dataType: 'json',
                success: function(response) {
                    hideLoadingIndicator();
                    if (response.success) {
                        $('#success-box').css('display', 'block');
                        $('#success-title').html('Success!');
                        $('#success-text').html('Campaign updated successfully.');
                        goToByScroll('success-box');
                        // Reload campaigns list
                        loadCampaigns();
                    } else {
                        $('#error-box').css('display', 'block');
                        $('#error-title').html('Error');
                        $('#error-text').html(response.error || 'Failed to update campaign.');
                        goToByScroll('error-box');
                    }
                },
                error: function(xhr, status, error) {
                    hideLoadingIndicator();
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html('Failed to update campaign: ' + error);
                    goToByScroll('error-box');
                }
            });
        } else {
            // CREATE new campaign via AJAX
            $.ajax({
                url: '/api/campaigns',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                dataType: 'json',
                success: function(response) {
                    hideLoadingIndicator();
                    if (response.success) {
                        $('#success-box').css('display', 'block');
                        $('#success-title').html('Success!');
                        $('#success-text').html('Campaign created successfully.');
                        goToByScroll('success-box');
                        // Clear form
                        $('#name').val('');
                        $('#description').val('');
                        $('#campaign').val('');
                        // Reload campaigns list
                        loadCampaigns();
                    } else {
                        $('#error-box').css('display', 'block');
                        $('#error-title').html('Error');
                        $('#error-text').html(response.error || 'Failed to create campaign.');
                        goToByScroll('error-box');
                    }
                },
                error: function(xhr, status, error) {
                    hideLoadingIndicator();
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html('Failed to create campaign: ' + error);
                    goToByScroll('error-box');
                }
            });
        }
    }
