<script>
    var map;
    var markers = [];
    var plantId = null;
    var plantData = null;

    // Get plant ID from URL
    function getPlantIdFromUrl() {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }

    // Initialize Google Map
    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            zoom: 10,
            center: {lat: 35.4676, lng: -97.5164} // Default to Oklahoma
        });

        initTrafficLayer(map);

        // Load plant data after map is initialized
        loadPlantData();
    }

    // Initialize traffic layer control
    function initTrafficLayer(map) {
        var controlDiv = document.createElement('DIV');
        $(controlDiv).addClass('gmap-control-container').addClass('gmnoprint');

        var controlUI = document.createElement('DIV');
        $(controlUI).addClass('gmap-control');
        $(controlUI).text('Traffic');
        $(controlDiv).append(controlUI);

        var legend = '<ul>'
            + '<li><span style="background-color: #30ac3e">&nbsp;&nbsp;</span><span style="color: #30ac3e">&nbsp;&nbsp; &gt; 50 mph (80+ km)</span></li>'
            + '<li><span style="background-color: #ffcf00">&nbsp;&nbsp;</span><span style="color: #ffcf00">&nbsp;&nbsp; 25 - 50 mph (40 - 80 km)</span></li>'
            + '<li><span style="background-color: #ff0000">&nbsp;&nbsp;</span><span style="color: #ff0000">&nbsp;&nbsp; &lt; 25 mph (40 km)</span></li>'
            + '<li><span style="background-color: #c0c0c0">&nbsp;&nbsp;</span><span style="color: #c0c0c0">&nbsp;&nbsp; No data available</span></li>'
            + '</ul>';

        var controlLegend = document.createElement('DIV');
        $(controlLegend).addClass('gmap-control-legend');
        $(controlLegend).html(legend);
        $(controlLegend).hide();
        $(controlDiv).append(controlLegend);

        $(controlUI)
            .mouseenter(function() { $(controlLegend).show(); })
            .mouseleave(function() { $(controlLegend).hide(); });

        var trafficLayer = new google.maps.TrafficLayer();

        google.maps.event.addDomListener(controlUI, 'click', function() {
            if (typeof trafficLayer.getMap() == 'undefined' || trafficLayer.getMap() === null) {
                $(controlUI).addClass('gmap-control-active');
                trafficLayer.setMap(map);
            } else {
                trafficLayer.setMap(null);
                $(controlUI).removeClass('gmap-control-active');
            }
        });

        map.controls[google.maps.ControlPosition.TOP_RIGHT].push(controlDiv);
    }

    // Clear all markers
    function clearMarkers() {
        for (var i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
    }

    // Set marker on map
    function setPlantMarker(lat, lng, title, code) {
        clearMarkers();

        var position = {lat: parseFloat(lat), lng: parseFloat(lng)};

        var image = {
            url: '/Marker/uscplant?text=' + encodeURIComponent(code || 'N/A'),
            size: new google.maps.Size(40, 40),
            origin: new google.maps.Point(0, 0),
            anchor: new google.maps.Point(20, 39)
        };

        var infoContent = '<small>Plant: ' + title + ' : ' + code + '</small><br>' +
            '<small>Address: ' + ($('#address').val() || '') + '</small><br>' +
            '<small>City: ' + ($('#city').val() || '') + '</small><br>' +
            '<small>State: ' + ($('#stateorprovince').val() || '') + '</small><br>' +
            '<small>Zip: ' + ($('#postalcode').val() || '') + '</small>';

        var infowindow = new google.maps.InfoWindow({
            content: infoContent,
            maxWidth: 200
        });

        var marker = new google.maps.Marker({
            position: position,
            map: map,
            icon: image,
            title: title
        });

        marker.addListener('click', function() {
            infowindow.open(map, marker);
        });

        markers.push(marker);

        // Center map on marker
        map.setCenter(position);
        map.setZoom(15);
    }

    // Load plant data from API
    function loadPlantData() {
        plantId = getPlantIdFromUrl();

        if (!plantId) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('Error');
            $('#error-text').html('No plant ID specified.');
            return;
        }

        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/plants/' + plantId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success && response.data) {
                    plantData = response.data;
                    populateForm(plantData);

                    // Set marker on map
                    if (plantData.latitude && plantData.longitude) {
                        setPlantMarker(
                            plantData.latitude,
                            plantData.longitude,
                            plantData.name || '',
                            plantData.code || ''
                        );
                    }
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to load plant data.');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to load plant data: ' + error);
            }
        });
    }

    // Populate form with plant data
    function populateForm(data) {
        $('#planteid').val(data.code || '');
        $('#plantname').val(data.name || '');
        $('#address').val(data.address || '');
        $('#city').val(data.city || '');
        $('#stateorprovince').val(data.state || '');
        $('#country').val(data.country || '');
        $('#postalcode').val(data.zipcode || '');
        $('#phonenumber').val(data.phone || '');
        $('#latitude').val(data.latitude || '');
        $('#longitude').val(data.longitude || '');
    }

    // Validate form
    function onValidate_edit_plant_form() {
        var message = "";

        if (!$('#planteid').val() || $('#planteid').val().trim() === '') {
            message += "Plant Number is required.<br>";
        }
        if (!$('#plantname').val() || $('#plantname').val().trim() === '') {
            message += "Plant Name is required.<br>";
        }

        return message;
    }

    // Submit form
    function onSubmit_edit_plant_form() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate form
        var validationMessage = onValidate_edit_plant_form();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            return;
        }

        // Prepare data
        var formData = {
            code: $('#planteid').val(),
            name: $('#plantname').val(),
            address: $('#address').val(),
            city: $('#city').val(),
            state: $('#stateorprovince').val(),
            country: $('#country').val(),
            zipcode: $('#postalcode').val(),
            phone: $('#phonenumber').val(),
            latitude: $('#latitude').val(),
            longitude: $('#longitude').val()
        };

        showLoadingIndicator();

        $.ajax({
            url: '/api/admin/plants/' + plantId,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Plant information has been updated successfully.');

                    // Update map marker with new coordinates
                    if (formData.latitude && formData.longitude) {
                        setPlantMarker(
                            formData.latitude,
                            formData.longitude,
                            formData.name,
                            formData.code
                        );
                    }
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to update plant.');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to update plant: ' + error);
            }
        });
    }

    // Update map when lat/lng changes
    $(document).ready(function() {
        $('#latitude, #longitude').on('change', function() {
            var lat = $('#latitude').val();
            var lng = $('#longitude').val();
            if (lat && lng) {
                setPlantMarker(lat, lng, $('#plantname').val(), $('#planteid').val());
            }
        });
    });
</script>
