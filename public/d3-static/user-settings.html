<script>
    // Store notifications from API (loaded dynamically from database)
    var currentNotifications = [];

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Get user ID from URL
    function getUserIdFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('id') || params.get('userId') || params.get('UserID');
    }

    // Store current user data
    var currentUser = null;
    var currentSettings = null;

    // Load user settings
    function loadUserSettings() {
        var userId = getUserIdFromUrl();
        if (!userId) {
            $('#welcome-label').html('Error: No User ID provided');
            return;
        }

        $('#userId').val(userId);
        showLoadingIndicator();

        // Get user details first
        $.ajax({
            url: '/api/admin/users/' + userId,
            type: 'GET',
            dataType: 'json',
            success: function(userResponse) {
                if (userResponse.success && userResponse.data) {
                    currentUser = userResponse.data;
                    var name = currentUser.name || 'User';
                    var firstName = name.split(' ')[0];
                    $('#welcome-label').html('Welcome, ' + escapeHtml(firstName) + '!');
                    document.title = name + ' - Settings';

                    // Set phone number
                    if (currentUser.phone) {
                        $('#mobile').val(currentUser.phone);
                    }
                }

                // Load settings
                loadSettings(userId);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#welcome-label').html('Error loading user');
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to load user details: ' + error);
            }
        });
    }

    // Load settings from API
    function loadSettings(userId) {
        $.ajax({
            url: '/api/admin/users/' + userId + '/settings',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                hideLoadingIndicator();

                if (response.success && response.settings) {
                    currentSettings = response.settings;
                    applySettings(response.settings);
                }

                // Store notifications from API (includes event_type_id from database)
                currentNotifications = response.notifications || [];

                // Render notifications table
                renderNotificationsTable(currentNotifications);
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                // Not critical, just render empty notifications
                renderNotificationsTable([]);
            }
        });
    }

    // Apply settings to form
    function applySettings(settings) {
        if (settings.time_format) {
            $('#datetimeformat').val(settings.time_format);
        }
        if (settings.measurement_system) {
            $('#measurementsystem').val(settings.measurement_system);
        }
        if (settings.timezone) {
            $('#timezone').val(settings.timezone);
        }
        if (settings.market_summary_view) {
            $('#marketsummaryview').val(settings.market_summary_view);
        }
        if (settings.mobile) {
            $('#mobile').val(settings.mobile);
        }
    }

    // Render notifications table using data from API
    function renderNotificationsTable(notifications) {
        var html = '';
        var rowClass = 'even';

        if (notifications.length === 0) {
            html = '<tr><td colspan="3">No notification types configured</td></tr>';
            $('#notifications-tbody').html(html);
            return;
        }

        $.each(notifications, function(index, notif) {
            rowClass = (index % 2 === 0) ? 'even gradeA' : 'odd gradeA';

            var emailChecked = notif.email_enabled ? ' checked' : '';
            var smsChecked = notif.sms_enabled ? ' checked' : '';

            // Use event_type_id as the identifier
            var notifId = notif.event_type_id;

            // Email checkbox - always show for flexibility
            var emailCell = '<input type="checkbox" name="email_' + notifId + '" value="' + notifId + '"' + emailChecked + '>';
            // SMS checkbox
            var smsCell = '<input type="checkbox" name="sms_' + notifId + '" value="' + notifId + '"' + smsChecked + '>';

            html += '<tr class="' + rowClass + '" data-event-type-id="' + notifId + '">';
            html += '<td style="">' + escapeHtml(notif.name) + '</td>';
            html += '<td style="">' + emailCell + '</td>';
            html += '<td style="">' + smsCell + '</td>';
            html += '</tr>';
        });

        $('#notifications-tbody').html(html);

        // Initialize DataTable if available
        if ($.fn.dataTable) {
            $('#notifications-table').dataTable({
                "sDom": "<'row'<'span6'l><'span6'f>r>t<'row'<'span6'><'span6'p>>",
                "sPaginationType": "bootstrap",
                "bPaginate": false,
                "bFilter": false,
                "bSort": false,
                "oLanguage": {
                    "sLengthMenu": "_MENU_ records per page"
                },
                "bDestroy": true
            });
        }
    }

    // Form validation
    function onValidate_settings_form() {
        var message = "";
        return message;
    }

    // Form submission
    function onSubmit_settings_form() {
        // Hide all alert boxes first
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate
        var validationMessage = onValidate_settings_form();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        var userId = $('#userId').val();
        if (!userId) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('Error');
            $('#error-text').html('User ID is missing');
            return;
        }

        // Collect settings
        var settings = {
            mobile: $('#mobile').val(),
            time_format: $('#datetimeformat').val(),
            measurement_system: $('#measurementsystem').val(),
            timezone: $('#timezone').val(),
            market_summary_view: $('#marketsummaryview').val()
        };

        // Collect notifications using event_type_id from loaded data
        var notifications = [];
        $.each(currentNotifications, function(idx, notif) {
            var notifId = notif.event_type_id;
            var emailEnabled = $('input[name="email_' + notifId + '"]').is(':checked');
            var smsEnabled = $('input[name="sms_' + notifId + '"]').is(':checked');

            notifications.push({
                event_type_id: notifId,
                notification_type: notif.notification_type,
                email_enabled: emailEnabled,
                sms_enabled: smsEnabled
            });
        });

        showLoadingIndicator();

        // Submit via AJAX
        $.ajax({
            url: '/api/admin/users/' + userId + '/settings',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ settings: settings, notifications: notifications }),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html('Settings saved successfully');
                    goToByScroll('success-box');
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to save settings');
                    goToByScroll('error-box');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                var errorMsg = 'Failed to save settings';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.error) errorMsg = resp.error;
                } catch(e) {}
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html(errorMsg);
                goToByScroll('error-box');
            }
        });
    }

    // Initialize on page load
    $(document).ready(function() {
        loadUserSettings();
    });
</script>
