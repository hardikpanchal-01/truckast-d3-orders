<script>
    // Get parameters from URL
    function getUrlParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Load roles list
    function loadRoles() {
        $.ajax({
            url: '/api/admin/roles',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                var roleSelect = $('#roleidurl');
                roleSelect.empty();
                roleSelect.append('<option value="">BUILD A NEW ROLE (0 USERS)</option>');

                if (response.success && response.data) {
                    response.data.forEach(function(role) {
                        var userCount = role.user_count || 0;
                        var optionText = role.name.toUpperCase() + ' (' + userCount + ' USERS)';
                        roleSelect.append('<option value="' + role.id + '">' + escapeHtml(optionText) + '</option>');
                    });
                }

                // Check if editing existing role
                var roleId = getUrlParam('RoleID') || getUrlParam('roleId');
                if (roleId) {
                    roleSelect.val(roleId);
                    loadRoleDetails(roleId);
                }
            },
            error: function() {
                console.error('Failed to load roles');
            }
        });
    }

    // Load role details when selected
    function loadRoleDetails(roleId) {
        if (!roleId) {
            $('#roleId').val('');
            $('#rolename').val('');
            clearNodeSelection();
            return;
        }

        $.ajax({
            url: '/api/admin/roles/' + roleId,
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                if (response.success && response.data) {
                    var role = response.data;
                    $('#roleId').val(role.id);
                    $('#rolename').val(role.name);

                    // Check the nodes that are assigned to this role
                    clearNodeSelection();
                    if (role.nodes && role.nodes.length > 0) {
                        role.nodes.forEach(function(nodeId) {
                            $('input[name="organization-' + nodeId + '"]').prop('checked', true);
                        });
                    }
                }
            },
            error: function() {
                console.error('Failed to load role details');
            }
        });
    }

    // Clear all node selections
    function clearNodeSelection() {
        $('#nodes-list input[type="checkbox"]').prop('checked', false);
    }

    // Load nodes/organizations list
    function loadNodes() {
        $.ajax({
            url: '/api/admin/nodes',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                var nodesList = $('#nodes-list');
                nodesList.empty();

                if (response.success && response.data && response.data.length > 0) {
                    response.data.forEach(function(node) {
                        var li = '<li><label class="checkbox"><input name="organization-' + node.id + '" type="checkbox">' + escapeHtml(node.name) + '</label></li>';
                        nodesList.append(li);
                    });
                } else {
                    nodesList.html('<li><label class="checkbox"><input type="checkbox" disabled>No nodes available</label></li>');
                }
            },
            error: function() {
                $('#nodes-list').html('<li><label class="checkbox"><input type="checkbox" disabled>Failed to load nodes</label></li>');
            }
        });
    }

    // Handle role dropdown change
    $(document).ready(function() {
        $('#roleidurl').change(function() {
            var roleId = $(this).val();
            if (roleId) {
                // Update URL without reloading
                var newUrl = window.location.pathname + '?RoleID=' + roleId;
                window.history.pushState({ roleId: roleId }, '', newUrl);
                loadRoleDetails(roleId);
            } else {
                // Clear form for new role
                window.history.pushState({}, '', window.location.pathname);
                $('#roleId').val('');
                $('#rolename').val('');
                clearNodeSelection();
            }
        });
    });

    // Validate form
    function onValidate__build_role() {
        var message = "";

        var roleName = $('#rolename').val();
        if (!roleName || roleName.trim().length === 0) {
            message += 'Role name is required.<br/>';
        }

        return message;
    }

    // Get selected nodes
    function getSelectedNodes() {
        var nodes = [];
        $('#nodes-list input[type="checkbox"]:checked').each(function() {
            var name = $(this).attr('name');
            if (name && name.startsWith('organization-')) {
                var nodeId = name.replace('organization-', '');
                nodes.push(nodeId);
            }
        });
        return nodes;
    }

    // Submit form
    function onSubmit_build_role() {
        // Hide all alert boxes
        $('#error-box').css('display', 'none');
        $('#success-box').css('display', 'none');
        $('#warning-box').css('display', 'none');
        $('#information-box').css('display', 'none');

        // Validate
        var validationMessage = onValidate__build_role();
        if (validationMessage != null && validationMessage.length > 0) {
            $('#error-box').css('display', 'block');
            $('#error-title').html('One or more fields were not properly filled out');
            $('#error-text').html(validationMessage);
            goToByScroll('error-box');
            return;
        }

        var roleId = $('#roleId').val();
        var roleName = $('#rolename').val().trim();
        var selectedNodes = getSelectedNodes();

        // Show loading indicator
        showLoadingIndicator();

        // Determine if creating or updating
        var url = roleId ? '/api/admin/roles/' + roleId : '/api/admin/roles';
        var method = roleId ? 'PUT' : 'POST';

        // Send request
        $.ajax({
            url: url,
            type: method,
            contentType: 'application/json',
            data: JSON.stringify({
                name: roleName,
                nodes: selectedNodes
            }),
            success: function(response) {
                hideLoadingIndicator();

                if (response.success) {
                    $('#success-box').css('display', 'block');
                    $('#success-title').html('Success');
                    $('#success-text').html(roleId ? 'Role updated successfully.' : 'Role created successfully.');
                    goToByScroll('success-box');

                    // Reload roles list
                    loadRoles();

                    // If new role, set the roleId
                    if (!roleId && response.data && response.data.id) {
                        $('#roleId').val(response.data.id);
                        var newUrl = window.location.pathname + '?RoleID=' + response.data.id;
                        window.history.pushState({ roleId: response.data.id }, '', newUrl);
                    }
                } else {
                    $('#error-box').css('display', 'block');
                    $('#error-title').html('Error');
                    $('#error-text').html(response.error || 'Failed to save role.');
                    goToByScroll('error-box');
                }
            },
            error: function(xhr, status, error) {
                hideLoadingIndicator();
                $('#error-box').css('display', 'block');
                $('#error-title').html('Error');
                $('#error-text').html('Failed to save role: ' + error);
                goToByScroll('error-box');
            }
        });
    }

    // Initialize on page load
    $(document).ready(function() {
        loadRoles();
        loadNodes();
    });
</script>
